<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
<title>Readever</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --k: #000;
  --w: #fff;
  --g: #555;
  --d: #bbb;
  --ui: 'IBM Plex Sans', Arial, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --body: 'Lora', Georgia, serif;

  --kw: 618px;
  --kh: 824px;
}

@media (max-width: 1280px) {
  :root {
    --kw: 100vw;
    --kh: 100dvh;
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%;
  height: 100%;
  min-height: 100vh;
  background: #888;
  background-image: conic-gradient(#000 25%,#fff 0 50%,#000 0 75%,#fff 0);
  background-size: 6px 6px;
  image-rendering: pixelated;
  font-family: var(--ui);
  font-size: 16px;
  color: var(--k);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.kindle-frame {
  width: var(--kw);
  height: var(--kh);
  background: var(--w);
  border: 3px solid var(--k);
  box-shadow: 7px 7px 0 var(--k);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
}

@media (max-width: 1280px) {
  html, body { overflow: hidden; }
  .kindle-frame {
    border: none;
    box-shadow: none;
  }
}

/* ── TITLE BAR ── */
.tbar {
  border-bottom: 3px solid var(--k);
  height: 46px;
  display: flex;
  align-items: center;
  padding: 0 5px;
  gap: 0;
  overflow: hidden;
  user-select: none;
  flex-shrink: 0;
}

@media (min-width: 1280px) {
  .tbar {
    height: 46px;
  }
  .tb-pct {
    font-size: 11px;
  }
}
.tfill {
  flex: 1;
  height: 12px;
  background: repeating-linear-gradient(180deg,var(--k) 0 2px,var(--w) 2px 4px);
  margin: 0 5px;
  display: flex;
  align-items: center;
}
.tb-progress {
  width: 100%;
  height: 4px;
  background: var(--d);
  border-radius: 2px;
  overflow: hidden;
}
.tb-bar {
  height: 100%;
  background: var(--k);
  width: 0%;
  transition: width 0.15s;
}
.tb-pct {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--g);
  margin: 0 5px;
}

/* ── BUTTONS ── */
.btn {
  background: var(--w);
  border: 3px solid var(--k);
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--k);
  cursor: pointer;
  min-width: 46px;
  min-height: 36px;
  padding: 4px 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-shadow: 3px 3px 0 var(--k);
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.05em;
  position: relative;
}
.btn::after { content:''; position:absolute; inset:-10px; }
.btn:active { box-shadow:none; transform:translate(3px,3px); background:var(--k); color:var(--w); }
.btn:disabled { color:var(--d); border-color:var(--d); box-shadow:none; pointer-events:none; }

@media (min-width: 1280px) {
  .btn {
    font-size: 14px;
    min-width: 50px;
    min-height: 40px;
  }
}

/* ── SCREENS ── */
#ss, #rs { display:flex; flex-direction:column; flex:1; min-height:0; }
#ss.off { display:none; }
#rs { display:none; }
#rs.on { display:flex; }

/* ══ SEARCH SCREEN ══ */
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 24px 40px;
  overflow: hidden;
}
.hero-sub {
  font-family: var(--ui);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: var(--g);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.hero-title {
  font-family: var(--ui);
  font-size: 46px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 28px;
  line-height: 1;
}

.sbar {
  width: 100%;
  max-width: 420px;
  display: flex;
  border: 3px solid var(--k);
  box-shadow: 4px 4px 0 var(--k);
  position: relative;
}
.sbar input {
  flex: 1;
  border: none;
  outline: none;
  font-family: var(--ui);
  font-size: 15px;
  padding: 14px 12px;
  min-height: 52px;
  background: var(--w);
  color: var(--k);
  -webkit-appearance: none;
}
.sbar-btn {
  background: var(--k);
  border: none;
  border-left: 3px solid var(--k);
  min-width: 56px;
  min-height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
  color: var(--w);
  flex-shrink: 0;
  position: relative;
}
.sbar-btn::after { content:''; position:absolute; inset:-10px; }
.sbar-btn:active { background: var(--g); }

#sug {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: -59px;
  background: var(--w);
  border: 3px solid var(--k);
  box-shadow: 4px 4px 0 var(--k);
  z-index: 200;
  max-height: 260px;
  overflow-y: auto;
}
#sug.open { display: block; }
.si {
  padding: 12px;
  border-bottom: 2px solid var(--k);
  display: flex;
  align-items: baseline;
  gap: 8px;
  min-height: 50px;
  font-size: 14px;
  cursor: pointer;
}
.si:last-child { border-bottom: none; }
.si:active { background: var(--k); color: var(--w); }
.si-auth { font-size: 11px; color: var(--g); margin-left: auto; white-space: nowrap; font-style: italic; }
.si:active .si-auth { color: var(--d); }

#smsg { font-size: 13px; color: var(--g); margin-top: 10px; text-align: center; min-height: 18px; }
.ld { display:none; align-items:center; gap:10px; justify-content:center; margin-top:12px; }
.ld.on { display:flex; }
.dot { width:9px; height:9px; background:var(--k); animation:bl 1s step-start infinite; }
.dot:nth-child(2){ animation-delay:.2s; }
.dot:nth-child(3){ animation-delay:.4s; }
@keyframes bl { 50%{ background:var(--d); } }
.ld span { font-family:var(--mono); font-size:11px; letter-spacing:.06em; }

.rarea {
  border-top: 3px solid var(--k);
  display: none;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
  max-height: 50%;
}
.rarea.on { display:flex; }
.rhdr {
  font-family:var(--mono);
  font-size:10px;
  color:var(--g);
  letter-spacing:.1em;
  text-transform:uppercase;
  padding:8px 14px;
  border-bottom: 2px solid var(--k);
  flex-shrink: 0;
  background: var(--w);
  position: sticky;
  top: 0;
}
.ri {
  border-bottom: 2px solid var(--k);
  padding: 12px 14px;
  background: var(--w);
  min-height: 58px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  cursor: pointer;
  flex-shrink: 0;
}
.ri:last-child { border-bottom: none; }
.ri:active { background:var(--k); color:var(--w); }
.ri:active .ri-m { color:var(--d); }
.ri-t { font-size:14px; font-weight:700; }
.ri-m { font-size:11px; color:var(--g); }
.err { display:none; padding:20px; text-align:center; font-family:var(--mono); font-size:0.85rem; color:var(--g); }
.err.on { display:block; }
.empty { display:none; border:3px dashed var(--k); margin:14px; padding:20px; text-align:center; font-size:13px; color:var(--g); }
.empty.on { display:block; }

/* ══ READER SCREEN ══ */

/*
  PAGE AREA — fills ALL remaining vertical space.
  NEVER scrolls. This is the hard boundary for text.
*/
#page-area {
  flex: 1;
  min-height: 0;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  background: var(--w);
}

#bl {
  display: none;
  flex: 1;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--g);
  letter-spacing: .06em;
}
#bl.on { display: flex; }

/*
  #bt — rendered page of text.
  overflow: hidden — hard clip, NEVER scrolls.
  The pagination engine guarantees content never exceeds this height.
  padding must exactly match PAD_H / PAD_V constants in JS below.
*/
#bt {
  font-family: var(--body);
  font-size: 1.0rem;
  line-height: 1.85;
  /* IMPORTANT: these padding values are mirrored in JS as PAD_H / PAD_V */
  padding: 18px 22px;
  flex: 1;
  min-height: 0;
  height: 100%;
  overflow: hidden;
  display: none;
  background: var(--w);
  color: var(--k);
  word-wrap: break-word;
  overflow-wrap: break-word;
  max-height: 100%;
}

@media (min-width: 1280px) {
  #bt {
    font-size: 1.1rem;
    padding: 20px 24px;
  }
}

.ch {
  display: block;
  font-family: var(--ui);
  font-size: 0.85em;
  font-weight: 700;
  text-align: center;
  letter-spacing: .16em;
  text-transform: uppercase;
  border-top: 2px solid var(--k);
  border-bottom: 2px solid var(--k);
  padding: 7px 0;
  margin: 14px 0 10px;
}

@media (min-width: 1280px) {
  .ch {
    font-size: 0.9em;
    padding: 8px 0;
    margin: 16px 0 12px;
  }
}

.nav {
  border-top: 3px solid var(--k);
  padding: 8px 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--w);
  flex-shrink: 0;
}
.nav .btn { min-width:86px; min-height:46px; font-size:12px; }
#pi { flex:1; text-align:center; font-family:var(--mono); font-size:11px; color:var(--g); letter-spacing:.06em; line-height:1.4; }

@media (min-width: 1280px) {
  .nav {
    padding: 10px 12px;
  }
  .nav .btn {
    min-width:100px;
    min-height:50px;
    font-size:14px;
  }
  #pi {
    font-size:13px;
  }
}

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--w); border-left:2px solid var(--k); }
::-webkit-scrollbar-thumb { background:var(--k); }
</style>
</head>
<body>

<div class="kindle-frame">

  <!-- ══ SEARCH SCREEN ══ -->
  <div id="ss">
    <div class="hero">
      <div class="hero-sub">Welcome to</div>
      <div class="hero-title">Readever</div>

      <div class="sbar">
        <div style="position:relative;flex:1;display:flex;">
          <input id="si" type="text" placeholder="what do you want to read?"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
          <div id="sug"></div>
        </div>
        <button class="sbar-btn" id="sb">→</button>
      </div>

      <div id="smsg"></div>
      <div class="ld" id="ld">
        <div style="display:flex;gap:5px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <span>Searching...</span>
      </div>
    </div>

    <div class="rarea" id="ra">
      <div class="rhdr" id="rh"></div>
      <div id="rl"></div>
      <div class="empty" id="em">[ No books found. Try another search. ]</div>
    </div>
  </div>

  <!-- ══ READER SCREEN ══ -->
  <div id="rs">
    <div class="tbar">
      <button class="btn" id="fd" style="min-width:40px;font-size:14px;">A−</button>
      <button class="btn" id="fu" style="min-width:40px;font-size:14px;">A+</button>
      <div class="tfill">
        <div class="tb-progress">
          <div class="tb-bar" id="pf"></div>
        </div>
      </div>
      <span class="tb-pct" id="pp">0%</span>
      <button class="btn" id="back2" style="min-width:54px;font-size:11px;">← LIST</button>
    </div>

    <div id="page-area">
      <div id="bl" class="on">[ Loading... ]</div>
      <div id="bt"></div>
    </div>

    <div class="nav">
      <button class="btn" id="pv" disabled>◄ PREV</button>
      <span id="pi">— / —</span>
      <button class="btn" id="nx" disabled>NEXT ►</button>
    </div>
  </div>

</div>

<script>
'use strict';

const API = 'https://gutendex.com/books/';
const PRX = 'https://corsproxy.io/?';

const $ = id => document.getElementById(id);
const ss=$('ss'), rs=$('rs'), si=$('si'), sug=$('sug'),
      smsg=$('smsg'), ld=$('ld'), rl=$('rl'), ra=$('ra'),
      rh=$('rh'), em=$('em'), bl=$('bl'),
      bt=$('bt'), pf=$('pf'), pp=$('pp'), pi=$('pi'),
      pv=$('pv'), nx=$('nx'), pageArea=$('page-area');

let debT = null;
let allParagraphs = [];
let pages = [];
let cur = 0;
let fs = 1.0;
let paginating = false;

// ═══════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════

si.addEventListener('input', () => {
  const q = si.value.trim();
  clearTimeout(debT);
  if (q.length < 2) { hideSug(); return; }
  debT = setTimeout(() => suggest(q), 360);
});
si.addEventListener('keydown', e => { if (e.key === 'Enter') { hideSug(); search(); } });
$('sb').addEventListener('click', () => { hideSug(); search(); });

async function suggest(q) {
  try {
    const d = await (await fetch(`${API}?search=${encodeURIComponent(q)}&page=1`)).json();
    const items = (d.results || []).slice(0, 6);
    if (!items.length) { hideSug(); return; }
    sug.innerHTML = '';
    const frag = document.createDocumentFragment();
    for (const b of items) {
      const el = document.createElement('div');
      el.className = 'si';
      const a = b.authors[0]?.name || '';
      el.innerHTML = `<span>${esc(b.title)}</span><span class="si-auth">${esc(a)}</span>`;
      el.onclick = () => { si.value = b.title; hideSug(); openBook(b); };
      frag.appendChild(el);
    }
    sug.appendChild(frag);
    sug.classList.add('open');
  } catch(_) { hideSug(); }
}
function hideSug() { sug.classList.remove('open'); }

async function search() {
  const q = si.value.trim(); if (!q) return;
  rl.innerHTML = ''; em.classList.remove('on'); ra.classList.remove('on');
  ld.classList.add('on'); smsg.textContent = '';
  try {
    const d = await (await fetch(`${API}?search=${encodeURIComponent(q)}&page=1`)).json();
    const books = d.results || [];
    ld.classList.remove('on');
    ra.classList.add('on');
    if (!books.length) { em.classList.add('on'); return; }
    rh.textContent = `${books.length} result${books.length > 1 ? 's' : ''} found`;
    const frag = document.createDocumentFragment();
    for (const b of books) {
      const el = document.createElement('div');
      el.className = 'ri';
      let a = 'Unknown';
      if (b.authors?.length) a = b.authors.map(x => x.name).join(', ');
      el.innerHTML = `<div class="ri-t">${esc(b.title)}</div>
                      <div class="ri-m">${esc(a)} · ${(b.download_count||0).toLocaleString()} reads</div>`;
      el.onclick = () => openBook(b);
      frag.appendChild(el);
    }
    rl.appendChild(frag);
  } catch(_) {
    ld.classList.remove('on');
    smsg.textContent = 'Could not reach server.';
    ra.classList.add('on');
  }
}

// ═══════════════════════════════════════════════
// OPEN BOOK
// ═══════════════════════════════════════════════

async function openBook(b) {
  bt.innerHTML = '';
  bt.style.display = 'none';
  bl.classList.add('on');
  allParagraphs = []; pages = []; cur = 0;
  pv.disabled = true; nx.disabled = true;
  pi.textContent = '— / —';
  pf.style.width = '0%'; pp.textContent = '0%';

  ss.classList.add('off');
  rs.classList.add('on');

  const url = bestUrl(b.formats);
  if (!url) { showErr('No text version available.'); return; }

  try {
    let txt = null;
    try {
      const r = await fetch(url, { mode: 'cors' });
      if (r.ok) txt = await r.text();
    } catch(_) {}

    if (!txt) {
      const r = await fetch(PRX + encodeURIComponent(url));
      if (!r.ok) throw new Error('proxy failed');
      txt = await r.text();
    }

    if (!txt || txt.length < 100) throw new Error('Book content is empty');
    processText(txt);
  } catch(_) {
    showErr('Could not load book. Check your connection.');
  }
}

function bestUrl(f) {
  for (const m of ['text/plain; charset=utf-8','text/plain; charset=us-ascii','text/plain'])
    if (f[m]) return f[m];
  const k = Object.keys(f).find(k => k.startsWith('text/plain'));
  return k ? f[k] : null;
}

// ═══════════════════════════════════════════════
// TEXT PROCESSING
// ═══════════════════════════════════════════════

function processText(raw) {
  let t = raw;

  const s = t.search(/\*{3}\s*START OF (THE|THIS) PROJECT GUTENBERG/i);
  if (s !== -1) t = t.slice(t.indexOf('\n', s) + 1);
  const en = t.search(/\*{3}\s*END OF (THE|THIS) PROJECT GUTENBERG/i);
  if (en !== -1) t = t.slice(0, en);
  t = t.trim();

  const paragraphs = t.split(/\n\s*\n/);
  const processed = [];

  for (const para of paragraphs) {
    const trimmed = para.trim();
    if (!trimmed) continue;

    const isChapterHeader =
      /^(CHAPTER|PART|BOOK|SECTION|PROLOGUE|EPILOGUE|PREFACE|APPENDIX|VOLUME)\b/i.test(trimmed) ||
      (trimmed.length < 120 && trimmed === trimmed.toUpperCase() && /[A-Z]{3}/.test(trimmed) && !trimmed.includes('.'));

    if (isChapterHeader) {
      processed.push({ type: 'header', text: trimmed });
      continue;
    }

    const lines = trimmed.split('\n');
    const reconstructed = [];

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;

      const prevLine = reconstructed[reconstructed.length - 1];
      const shouldContinue =
        prevLine &&
        !prevLine.endsWith('.') &&
        !prevLine.endsWith('!') &&
        !prevLine.endsWith('?') &&
        !prevLine.endsWith('"') &&
        !/^[A-Z]$/.test(line[0]) &&
        !/^(CHAPTER|PART|BOOK|SECTION|PROLOGUE|EPILOGUE|PREFACE|APPENDIX|VOLUME)\b/i.test(line);

      if (shouldContinue) {
        reconstructed[reconstructed.length - 1] += ' ' + line;
      } else {
        reconstructed.push(line);
      }
    }

    processed.push({ type: 'text', text: reconstructed.join(' ') });
  }

  allParagraphs = [];
  for (const item of processed) {
    if (item.type === 'header') {
      allParagraphs.push(`<span class="ch">${esc(item.text)}</span>`);
      continue;
    }

    if (item.text.length <= 350) {
      allParagraphs.push(esc(item.text));
      continue;
    }

    const sentences = item.text.split(/(?<=[.!?])\s+(?=[A-Z])/);
    for (const s of sentences) {
      const trimmed = s.trim();
      if (trimmed) allParagraphs.push(esc(trimmed));
    }
  }

  bl.classList.remove('on');
  bt.style.display = 'block';

  waitForLayout(() => paginate(() => render(0)));
}

function waitForLayout(cb) {
  let tries = 0;
  function check() {
    tries++;
    const h = pageArea.offsetHeight;
    const w = bt.offsetWidth || pageArea.offsetWidth;
    if (h > 80 && w > 80 || tries >= 10) cb();
    else requestAnimationFrame(check);
  }
  requestAnimationFrame(check);
}

// ═══════════════════════════════════════════════
// PAGINATION ENGINE — overflow detection
// ═══════════════════════════════════════════════
/*
  Strategy: use #bt itself as the measurement container.
  1. Set bt to its real dimensions (flex:1, overflow:hidden).
  2. Add paragraphs one by one into bt.
  3. After each addition, check if bt.scrollHeight > bt.clientHeight.
     If it overflows → the PREVIOUS count was the page boundary.
  4. Store indices, clear bt, repeat for next page.

  This is the most accurate method possible — we're measuring
  in the exact element that will render the final text, with
  the exact same width, font, padding, and line-height.
  No probe guesswork needed.
*/
function paginate(done) {
  if (paginating) return;
  paginating = true;
  pages = [];

  if (!allParagraphs.length) { paginating = false; done(); return; }

  const total = allParagraphs.length;
  bt.style.fontSize = `${fs}rem`;

  const lineHeight = parseFloat(window.getComputedStyle(bt).lineHeight) || 29.6;
  const availableHeight = bt.clientHeight;
  const linesPerPage = Math.floor(availableHeight / lineHeight);
  const estimatedParagraphsPerPage = Math.max(3, Math.floor(linesPerPage / 2));

  let pageStart = 0;

  function buildPages() {
    bt.innerHTML = '';
    let i = pageStart;

    while (i < total) {
      const div = document.createElement('div');
      div.style.marginBottom = '0.7em';
      div.innerHTML = allParagraphs[i];
      bt.appendChild(div);

      if (bt.scrollHeight > bt.clientHeight + 5) {
        if (i === pageStart) {
          pages.push({ start: pageStart, end: i + 1 });
          pageStart = i + 1;
          bt.innerHTML = '';
          i = pageStart;
        } else {
          pages.push({ start: pageStart, end: i });
          pageStart = i;
          bt.innerHTML = '';
        }
      } else {
        i++;
      }
    }

    if (pageStart < total) {
      pages.push({ start: pageStart, end: total });
    }

    bt.innerHTML = '';

    if (pages.length === 1 && total > estimatedParagraphsPerPage) {
      const paragraphsPerPage = estimatedParagraphsPerPage;
      pages = [];
      for (let start = 0; start < total; start += paragraphsPerPage) {
        pages.push({ start: start, end: Math.min(start + paragraphsPerPage, total) });
      }
    }

    if (pages.length === 1 && total > 5) {
      const paragraphsPerPage = Math.max(2, Math.floor(total / Math.ceil(total / estimatedParagraphsPerPage)));
      pages = [];
      for (let start = 0; start < total; start += paragraphsPerPage) {
        pages.push({ start: start, end: Math.min(start + paragraphsPerPage, total) });
      }
    }

    paginating = false;
    done();
  }

  requestAnimationFrame(() => requestAnimationFrame(buildPages));
}

// ═══════════════════════════════════════════════
// RENDER — paint exactly one page
// ═══════════════════════════════════════════════

function render(n) {
  if (!pages.length) return;
  n = Math.max(0, Math.min(n, pages.length - 1));
  cur = n;

  const { start, end } = pages[n];
  bt.style.fontSize = `${fs}rem`;

  let html = '';
  for (let i = start; i < end; i++) {
    html += `<div style="margin-bottom:0.7em">${allParagraphs[i]}</div>`;
  }
  bt.innerHTML = html;

  pv.disabled = (n === 0);
  nx.disabled = (n === pages.length - 1);
  pi.textContent = `Page ${n + 1} of ${pages.length}`;

  const pct = pages.length > 1 ? Math.round((n / (pages.length - 1)) * 100) : 100;
  pf.style.width = `${pct}%`;
  pp.textContent = `${pct}%`;
}

function showErr(m) {
  bl.classList.remove('on');
  bt.style.display = 'block';
  bt.innerHTML = `<div class="err on">[ ${esc(m)} ]</div>`;
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════

pv.onclick = () => { if (cur > 0) render(cur - 1); };
nx.onclick = () => { if (cur < pages.length - 1) render(cur + 1); };

$('back2').onclick = () => {
  rs.classList.remove('on');
  ss.classList.remove('off');
};

// Touch swipe
let touchStartX = 0;
rs.addEventListener('touchstart', ev => {
  touchStartX = ev.changedTouches[0].clientX;
}, { passive: true });
rs.addEventListener('touchend', ev => {
  const dx = ev.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0 && cur < pages.length - 1) render(cur + 1);
    if (dx > 0 && cur > 0) render(cur - 1);
  }
}, { passive: true });

// Keyboard
document.addEventListener('keydown', e => {
  if (!rs.classList.contains('on')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (cur < pages.length - 1) render(cur + 1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { if (cur > 0) render(cur - 1); }
});

// ═══════════════════════════════════════════════
// FONT SIZE
// ═══════════════════════════════════════════════

$('fu').onclick = () => {
  if (fs < 1.8) { fs = +(fs + 0.1).toFixed(1); repaginate(); }
};
$('fd').onclick = () => {
  if (fs > 0.7) { fs = +(fs - 0.1).toFixed(1); repaginate(); }
};

function repaginate() {
  if (!allParagraphs.length) return;
  paginating = false;
  bt.style.fontSize = `${fs}rem`;
  const savedStart = pages[cur]?.start || 0;
  paginate(() => {
    const targetPage = pages.findIndex(p => p.end > savedStart);
    render(Math.max(0, targetPage));
  });
}

// Re-paginate on resize (desktop)
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (allParagraphs.length && rs.classList.contains('on')) repaginate();
  }, 300);
});

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════

function esc(s) {
  const str = String(s);
  return str.replace(/[&<"]/g, m => ({
    '&': '&amp;',
    '<': '&lt;',
    '"': '&quot;'
  }[m]));
}

document.addEventListener('click', ev => {
  if (!ev.target.closest('.sbar')) hideSug();
});
</script>
</body>
</html>
