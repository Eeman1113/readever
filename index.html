<body>

<div class="frame">

  <!-- ══ SEARCH SCREEN ══ -->
  <div id="ss">
    <div class="hero">
      <div class="hero-sub">Welcome to</div>
      <div class="hero-title">Readever</div>

      <div class="sbar">
        <div style="position:relative;-webkit-flex:1;flex:1;display:-webkit-box;display:-webkit-flex;display:flex;">
          <input id="si" type="text" placeholder="what do you want to read?"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
          <div id="sug"></div>
        </div>
        <button class="sbar-go" id="sb">&#8594;</button>
      </div>

      <div id="smsg"></div>
      <div class="ld" id="ld">
        <div style="display:-webkit-box;display:-webkit-flex;display:flex;gap:5px;">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <span>Searching...</span>
      </div>
    </div>

    <div class="rarea" id="ra">
      <div class="rhdr" id="rh"></div>
      <div id="rl"></div>
      <div class="empty" id="em">[ No books found. Try another search. ]</div>
    </div>
  </div>

  <!-- ══ READER SCREEN ══ -->
  <div id="rs">
    <div class="tbar">
      <button class="btn" id="fd" style="min-width:40px;font-size:15px;">A&#8722;</button>
      <button class="btn" id="fu" style="min-width:40px;font-size:15px;">A+</button>
      <div class="tfill">
        <div class="tb-track"><div class="tb-fill" id="pf"></div></div>
      </div>
      <span class="tb-pct" id="pp">0%</span>
      <button class="btn" id="back2" style="min-width:54px;font-size:11px;">&#8592; LIST</button>
    </div>

    <div id="page-area">
      <div id="bl" class="on">[ Loading... ]</div>
      <div id="bt"></div>
    </div>

    <div class="nav">
      <button class="btn" id="pv" disabled>&#9664; PREV</button>
      <span id="pi">&#8212; / &#8212;</span>
      <button class="btn" id="nx" disabled>NEXT &#9654;</button>
    </div>
  </div>

</div>

<script>
/*
  Readever — Kindle-optimised build
  ─────────────────────────────────
  Changes from previous version:
  - XHR replaces fetch() — no {mode:'cors'} that breaks old Webkit
  - No Google Fonts import — system fonts only, no render-blocking request
  - No async/await — plain callbacks and XHR.onreadystatechange
  - No dvh/svh — height:100vh only
  - No CSS custom property transitions
  - No off-screen probe element sitting in DOM — created, used, destroyed
  - Synchronous pagination loop (no rAF chains) — faster on slow CPUs
  - waitLayout uses setTimeout instead of rAF — more reliable on old Webkit
  - All localStorage wrapped in try/catch
  - E-ink flash refresh every 15 page turns (ReKindle pattern)
  - Prefixed flexbox throughout CSS for old Webkit
*/
'use strict';

var API      = 'https://gutendex.com/books/';
var PRX      = 'https://corsproxy.io/?';
var SAVE_KEY = 'readever_v2';

function gid(id) { return document.getElementById(id); }

var ss   = gid('ss'),  rs   = gid('rs'),  si   = gid('si');
var sug  = gid('sug'), smsg = gid('smsg'), ldEl = gid('ld');
var rl   = gid('rl'),  ra   = gid('ra'),  rh   = gid('rh');
var em   = gid('em'),  bl   = gid('bl'),  bt   = gid('bt');
var pf   = gid('pf'),  pp   = gid('pp'),  pi   = gid('pi');
var pv   = gid('pv'),  nx   = gid('nx'),  pa   = gid('page-area');

var paras   = [];
var pages   = [];
var cur     = 0;
var fs      = 1.0;
var bookId  = null;
var busy    = false;
var debT    = null;
var touchX  = 0;

/* ══════════════════════════════
   PROGRESS
   ══════════════════════════════ */

function pLoad() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY) || '{}'); }
  catch(e) { return {}; }
}
function pSave(bid, page) {
  try {
    var d = pLoad();
    d[bid] = { p: page, t: Date.now() };
    var keys = Object.keys(d).sort(function(a,b){ return (d[b].t||0)-(d[a].t||0); });
    if (keys.length > 40) { for (var i=40;i<keys.length;i++) delete d[keys[i]]; }
    localStorage.setItem(SAVE_KEY, JSON.stringify(d));
  } catch(e) {}
}
function pGet(bid) {
  try { var d = pLoad(); return d[bid] ? (d[bid].p || 0) : 0; }
  catch(e) { return 0; }
}

/* ══════════════════════════════
   SEARCH — XHR only, no fetch
   ══════════════════════════════ */

si.addEventListener('input', function() {
  var q = si.value.trim();
  clearTimeout(debT);
  if (q.length < 2) { hideSug(); return; }
  debT = setTimeout(function(){ suggest(q); }, 400);
});
si.addEventListener('keydown', function(e) {
  if ((e.key || '') === 'Enter' || e.keyCode === 13) { hideSug(); doSearch(); }
});
gid('sb').addEventListener('click', function() { hideSug(); doSearch(); });

function hideSug() { sug.className = ''; }

function xhr(url, cb) {
  var x = new XMLHttpRequest();
  x.open('GET', url, true);
  x.onreadystatechange = function() {
    if (x.readyState !== 4) return;
    cb(x.status === 200 ? x.responseText : null);
  };
  x.onerror = function() { cb(null); };
  x.send();
}

function suggest(q) {
  xhr(API + '?search=' + encodeURIComponent(q) + '&page=1', function(txt) {
    if (!txt) { hideSug(); return; }
    try {
      var d = JSON.parse(txt);
      var items = (d.results || []).slice(0, 5);
      if (!items.length) { hideSug(); return; }
      sug.innerHTML = '';
      for (var i = 0; i < items.length; i++) {
        (function(b) {
          var el = document.createElement('div');
          el.className = 'si';
          var a = b.authors && b.authors[0] ? b.authors[0].name : '';
          el.innerHTML = '<span>' + esc(b.title) + '</span>' +
            '<span class="si-auth">' + esc(a) + '</span>';
          el.onclick = function() { si.value = b.title; hideSug(); openBook(b); };
          sug.appendChild(el);
        })(items[i]);
      }
      sug.className = 'open';
    } catch(e) { hideSug(); }
  });
}

function doSearch() {
  var q = si.value.trim();
  if (!q) return;
  rl.innerHTML = '';
  em.className = 'empty';
  ra.className = 'rarea';
  ldEl.className = 'ld on';
  smsg.textContent = '';

  xhr(API + '?search=' + encodeURIComponent(q) + '&page=1', function(txt) {
    ldEl.className = 'ld';
    ra.className = 'rarea on';

    if (!txt) { smsg.textContent = 'Could not reach server. Check connection.'; return; }

    try {
      var d = JSON.parse(txt);
      var books = d.results || [];
      if (!books.length) { em.className = 'empty on'; return; }

      rh.textContent = books.length + ' result' + (books.length > 1 ? 's' : '') + ' found';
      var prog = pLoad();
      var frag = document.createDocumentFragment();

      for (var i = 0; i < books.length; i++) {
        (function(b) {
          var el = document.createElement('div');
          el.className = 'ri';
          var a = b.authors && b.authors.length
            ? b.authors.map(function(x){ return x.name; }).join(', ')
            : 'Unknown';
          var bid = String(b.id);
          var saved = prog[bid] && prog[bid].p > 0;
          el.innerHTML =
            '<div class="ri-t">' + esc(b.title) + '</div>' +
            '<div class="ri-m">' + esc(a) + ' &middot; ' +
              ((b.download_count||0).toLocaleString()) + ' reads</div>' +
            (saved ? '<span class="ri-badge">Resume p.' + (prog[bid].p + 1) + '</span>' : '');
          el.onclick = function() { openBook(b); };
          frag.appendChild(el);
        })(books[i]);
      }
      rl.appendChild(frag);
    } catch(e) { smsg.textContent = 'Error reading results.'; }
  });
}

/* ══════════════════════════════
   OPEN BOOK
   ══════════════════════════════ */

function openBook(b) {
  bookId = String(b.id);
  paras = []; pages = []; cur = 0; busy = false;
  bt.innerHTML = '';
  bt.style.display = 'none';
  bl.className = 'on';
  pv.disabled = true;
  nx.disabled = true;
  pi.textContent = '\u2014 / \u2014';
  pf.style.width = '0%';
  pp.textContent = '0%';

  ss.className = 'off';
  rs.className = 'on';

  var url = bestUrl(b.formats);
  if (!url) { showErr('No text version available.'); return; }

  xhr(url, function(txt) {
    if (txt && txt.length > 100) { processText(txt); return; }
    /* Proxy fallback */
    xhr(PRX + encodeURIComponent(url), function(txt2) {
      if (txt2 && txt2.length > 100) { processText(txt2); }
      else { showErr('Could not load book. Check connection.'); }
    });
  });
}

function bestUrl(f) {
  var order = ['text/plain; charset=utf-8','text/plain; charset=us-ascii','text/plain'];
  for (var i = 0; i < order.length; i++) { if (f[order[i]]) return f[order[i]]; }
  var keys = Object.keys(f);
  for (var j = 0; j < keys.length; j++) { if (keys[j].indexOf('text/plain') === 0) return f[keys[j]]; }
  return null;
}

/* ══════════════════════════════
   TEXT PROCESSING
   ══════════════════════════════ */

function processText(raw) {
  var t = raw;
  var s = t.search(/\*{3}\s*START OF (THE|THIS) PROJECT GUTENBERG/i);
  if (s !== -1) t = t.slice(t.indexOf('\n', s) + 1);
  var en = t.search(/\*{3}\s*END OF (THE|THIS) PROJECT GUTENBERG/i);
  if (en !== -1) t = t.slice(0, en);
  t = t.trim();

  var rawParas = t.split(/\n{2,}/);
  paras = [];

  for (var i = 0; i < rawParas.length; i++) {
    var trimmed = rawParas[i].trim();
    if (!trimmed || trimmed.length < 2) continue;

    var isHeader =
      /^(CHAPTER|PART|BOOK|SECTION|PROLOGUE|EPILOGUE|PREFACE|APPENDIX|VOLUME)\b/i.test(trimmed) ||
      (trimmed.length < 100 &&
       trimmed === trimmed.toUpperCase() &&
       /[A-Z]{3}/.test(trimmed) &&
       !/[.;]/.test(trimmed));

    if (isHeader) {
      paras.push('<span class="ch">' + esc(trimmed) + '</span>');
      continue;
    }

    /* Reconstruct soft-wrapped lines */
    var lines = trimmed.split('\n');
    var joined = '';
    for (var j = 0; j < lines.length; j++) {
      var line = lines[j].trim();
      if (!line) continue;
      if (!joined) { joined = line; continue; }
      var endsClean = /[.!?"'\)\]\u2014]$/.test(joined);
      var startsUpper = /^[A-Z"'\(\[]/.test(line);
      if (endsClean && startsUpper) { pushPara(joined); joined = line; }
      else { joined += ' ' + line; }
    }
    if (joined) pushPara(joined);
  }

  bl.className = '';
  bt.style.display = 'block';

  /* Wait for layout before paginating */
  waitLayout(function() {
    paginate(function() {
      render(pGet(bookId));
    });
  });
}

function pushPara(text) {
  if (text.length <= 360) { paras.push(esc(text)); return; }
  var sentences = text.match(/[^.!?]+[.!?]+['")\]]?\s*/g) || [text];
  var chunk = '';
  for (var i = 0; i < sentences.length; i++) {
    var s = sentences[i];
    if ((chunk + s).length > 340 && chunk) {
      paras.push(esc(chunk.trim()));
      chunk = s;
    } else { chunk += s; }
  }
  if (chunk.trim()) paras.push(esc(chunk.trim()));
}

function waitLayout(cb) {
  var tries = 0;
  function check() {
    tries++;
    if ((pa.offsetHeight > 80 && bt.offsetWidth > 80) || tries >= 30) { cb(); }
    else { setTimeout(check, 60); }
  }
  setTimeout(check, 80);
}

/* ══════════════════════════════
   PAGINATION ENGINE

   Creates a temporary hidden div inside #page-area
   (so it inherits real rendered width), fills it with
   paragraphs, checks scrollHeight overflow, records
   page boundaries, then destroys the div.

   Synchronous — no rAF chains. Fast on slow CPUs.
   ══════════════════════════════ */

function paginate(done) {
  if (busy) return;
  busy = true;
  pages = [];

  if (!paras.length) { busy = false; done(); return; }

  /* Temporary measure container */
  var m = document.createElement('div');
  m.style.cssText = [
    'position:absolute',
    'top:0',
    'left:0',
    'visibility:hidden',
    'pointer-events:none',
    'font-family:Georgia,"Times New Roman",serif',
    'font-size:' + fs + 'rem',
    'line-height:1.8',
    'padding:18px 20px',
    'word-wrap:break-word',
    'overflow-wrap:break-word',
    'overflow:hidden',
    'background:#fff',
    'width:' + pa.offsetWidth + 'px',
    'height:' + pa.offsetHeight + 'px'
  ].join(';');

  pa.appendChild(m);

  var total     = paras.length;
  var pageStart = 0;
  var i         = pageStart;

  while (i < total) {
    var div = document.createElement('div');
    div.style.marginBottom = '0.7em';
    div.innerHTML = paras[i];
    m.appendChild(div);

    if (m.scrollHeight > m.clientHeight + 2) {
      if (i === pageStart) {
        /* Paragraph alone fills the page — accept it */
        pages.push({ start: pageStart, end: i + 1 });
        pageStart = i + 1;
      } else {
        /* Overflow caused by this paragraph — end page before it */
        pages.push({ start: pageStart, end: i });
        pageStart = i;
      }
      m.innerHTML = '';
      i = pageStart;
    } else {
      i++;
    }
  }

  if (pageStart < total) pages.push({ start: pageStart, end: total });
  if (!pages.length)     pages.push({ start: 0, end: total });

  pa.removeChild(m);
  busy = false;
  done();
}

/* ══════════════════════════════
   RENDER
   ══════════════════════════════ */

function render(n) {
  if (!pages.length) return;
  n = n < 0 ? 0 : n >= pages.length ? pages.length - 1 : n;
  cur = n;

  var sl = pages[n];
  bt.style.fontSize = fs + 'rem';

  var html = '';
  for (var i = sl.start; i < sl.end; i++) {
    html += '<div style="margin-bottom:0.7em">' + paras[i] + '</div>';
  }
  bt.innerHTML = html;

  pv.disabled = (n === 0);
  nx.disabled = (n === pages.length - 1);
  pi.textContent = 'Page ' + (n + 1) + ' of ' + pages.length;

  var pct = pages.length > 1 ? Math.round((n / (pages.length - 1)) * 100) : 100;
  pf.style.width = pct + '%';
  pp.textContent = pct + '%';

  if (bookId) pSave(bookId, n);

  /* E-ink flash every 15 turns — ReKindle pattern */
  if (n > 0 && n % 15 === 0) einkFlash();
}

function einkFlash() {
  try {
    var mode = localStorage.getItem('rekindle_display_mode') || '';
    if (mode === 'screen') return;
  } catch(e) {}
  var f = document.createElement('div');
  f.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;pointer-events:none;';
  document.body.appendChild(f);
  /* Force reflow so the black frame actually paints */
  void f.offsetWidth;
  setTimeout(function() { if (f.parentNode) f.parentNode.removeChild(f); }, 400);
}

function showErr(msg) {
  bl.className = '';
  bt.style.display = 'block';
  bt.innerHTML = '<div style="padding:24px;text-align:center;font-family:\'Courier New\',monospace;font-size:0.85rem;color:#555;">[ ' + esc(msg) + ' ]</div>';
}

/* ══════════════════════════════
   NAVIGATION
   ══════════════════════════════ */

pv.onclick = function() { if (cur > 0) render(cur - 1); };
nx.onclick = function() { if (cur < pages.length - 1) render(cur + 1); };

gid('back2').onclick = function() { rs.className = ''; ss.className = ''; };

rs.addEventListener('touchstart', function(ev) {
  touchX = ev.changedTouches[0].clientX;
}, { passive: true });
rs.addEventListener('touchend', function(ev) {
  var dx = ev.changedTouches[0].clientX - touchX;
  if (dx < -50 && cur < pages.length - 1) render(cur + 1);
  if (dx >  50 && cur > 0)               render(cur - 1);
}, { passive: true });

document.addEventListener('keydown', function(e) {
  if (rs.className.indexOf('on') === -1) return;
  var k = e.key || '';
  if (k === 'ArrowRight' || k === 'ArrowDown' || e.keyCode === 39 || e.keyCode === 40) {
    if (cur < pages.length - 1) render(cur + 1);
  }
  if (k === 'ArrowLeft' || k === 'ArrowUp' || e.keyCode === 37 || e.keyCode === 38) {
    if (cur > 0) render(cur - 1);
  }
});

/* ══════════════════════════════
   FONT SIZE
   ══════════════════════════════ */

gid('fu').onclick = function() {
  if (fs < 1.8) { fs = Math.round((fs + 0.1) * 10) / 10; repaginate(); }
};
gid('fd').onclick = function() {
  if (fs > 0.7) { fs = Math.round((fs - 0.1) * 10) / 10; repaginate(); }
};

function repaginate() {
  if (!paras.length) return;
  busy = false;
  var savedStart = pages[cur] ? pages[cur].start : 0;
  paginate(function() {
    var target = 0;
    for (var i = 0; i < pages.length; i++) {
      if (pages[i].end > savedStart) { target = i; break; }
    }
    render(target);
  });
}

var resizeT;
window.addEventListener('resize', function() {
  clearTimeout(resizeT);
  resizeT = setTimeout(function() {
    if (paras.length && rs.className.indexOf('on') !== -1) repaginate();
  }, 350);
});

document.addEventListener('click', function(ev) {
  if (!ev.target.closest || !ev.target.closest('.sbar')) hideSug();
});

/* ══════════════════════════════
   UTILS
   ══════════════════════════════ */

function esc(s) {
  return String(s).replace(/[&<"]/g, function(m) {
    return { '&': '&amp;', '<': '&lt;', '"': '&quot;' }[m];
  });
}
</script>
</body>
