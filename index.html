<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Readever</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%; min-height: 100vh;
  background-color: #888;
  background-image: conic-gradient(#000 25%,#fff 0 50%,#000 0 75%,#fff 0);
  background-size: 6px 6px;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 16px; color: #000; overflow: hidden;
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  -webkit-justify-content: center; justify-content: center;
}
.frame {
  width: 618px; height: 824px; background: #fff;
  border: 3px solid #000;
  -webkit-box-shadow: 7px 7px 0 #000; box-shadow: 7px 7px 0 #000;
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-flex-direction: column; flex-direction: column;
  overflow: hidden; position: relative; -webkit-flex-shrink: 0; flex-shrink: 0;
}
@media (max-width: 700px) {
  html, body { overflow: hidden; }
  .frame { width: 100%; height: 100vh; border: none; -webkit-box-shadow: none; box-shadow: none; }
}

/* title bar */
.tbar {
  height: 46px; border-bottom: 3px solid #000;
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  padding: 0 6px; gap: 6px; overflow: hidden;
  -webkit-user-select: none; user-select: none;
  -webkit-flex-shrink: 0; flex-shrink: 0; background: #fff;
}
.tfill {
  -webkit-flex: 1; flex: 1; height: 12px;
  background: repeating-linear-gradient(180deg,#000 0 2px,#fff 2px 4px);
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center; padding: 0 6px; gap: 8px;
}
.tb-track { -webkit-flex:1; flex:1; height:4px; background:#bbb; overflow:hidden; }
.tb-fill  { height:100%; background:#000; width:0%; }
.tb-pct   { font-family:"Courier New",monospace; font-size:10px; font-weight:700; color:#555; min-width:32px; text-align:right; white-space:nowrap; }

/* buttons */
.btn {
  background:#fff; border:3px solid #000;
  font-family:"Courier New",monospace; font-size:13px; font-weight:700; color:#000;
  cursor:pointer; min-width:46px; min-height:36px; padding:4px 8px;
  display:-webkit-inline-box; display:-webkit-inline-flex; display:inline-flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  -webkit-box-shadow:3px 3px 0 #000; box-shadow:3px 3px 0 #000;
  white-space:nowrap; -webkit-flex-shrink:0; flex-shrink:0;
  letter-spacing:0.04em; -webkit-appearance:none; appearance:none; border-radius:0;
}
.btn:active { -webkit-box-shadow:none; box-shadow:none; -webkit-transform:translate(3px,3px); transform:translate(3px,3px); background:#000; color:#fff; }
.btn:disabled { color:#bbb; border-color:#bbb; -webkit-box-shadow:none; box-shadow:none; pointer-events:none; }

/* screens */
#ss { display:-webkit-box; display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; -webkit-flex:1; flex:1; min-height:0; }
#ss.off { display:none; }
#rs { display:none; -webkit-flex-direction:column; flex-direction:column; -webkit-flex:1; flex:1; min-height:0; }
#rs.on { display:-webkit-box; display:-webkit-flex; display:flex; }

/* search screen */
.hero {
  -webkit-flex:1; flex:1;
  display:-webkit-box; display:-webkit-flex; display:flex;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  padding:30px 24px 36px; overflow:hidden;
}
.hero-sub   { font-size:11px; letter-spacing:0.2em; color:#555; text-transform:uppercase; margin-bottom:4px; }
.hero-title { font-size:44px; font-weight:700; letter-spacing:-0.02em; margin-bottom:26px; line-height:1; }

.sbar {
  width:100%; max-width:420px;
  display:-webkit-box; display:-webkit-flex; display:flex;
  border:3px solid #000; -webkit-box-shadow:4px 4px 0 #000; box-shadow:4px 4px 0 #000;
  position:relative;
}
.sbar input {
  -webkit-flex:1; flex:1; border:none; outline:none;
  font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:15px; padding:14px 12px; min-height:52px;
  background:#fff; color:#000; -webkit-appearance:none; appearance:none; border-radius:0;
}
.sbar-go {
  background:#000; border:none; border-left:3px solid #000;
  min-width:54px; min-height:52px;
  display:-webkit-box; display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  cursor:pointer; font-size:20px; color:#fff;
  -webkit-flex-shrink:0; flex-shrink:0; -webkit-appearance:none; appearance:none; border-radius:0;
}
.sbar-go:active { background:#555; }

#sug {
  display:none; position:absolute; top:calc(100% + 4px); left:0; right:-57px;
  background:#fff; border:3px solid #000; -webkit-box-shadow:4px 4px 0 #000; box-shadow:4px 4px 0 #000;
  z-index:200; max-height:240px; overflow-y:auto;
}
#sug.open { display:block; }
.si { padding:12px; border-bottom:2px solid #000; display:-webkit-box; display:-webkit-flex; display:flex; -webkit-align-items:baseline; align-items:baseline; gap:8px; min-height:48px; font-size:14px; cursor:pointer; }
.si:last-child { border-bottom:none; }
.si:active { background:#000; color:#fff; }
.si-auth { font-size:11px; color:#555; margin-left:auto; white-space:nowrap; font-style:italic; }
.si:active .si-auth { color:#bbb; }

#smsg { font-size:13px; color:#555; margin-top:10px; text-align:center; min-height:18px; }
.ld { display:none; -webkit-align-items:center; align-items:center; gap:10px; -webkit-justify-content:center; justify-content:center; margin-top:12px; }
.ld.on { display:-webkit-box; display:-webkit-flex; display:flex; }
.dot { width:9px; height:9px; background:#000; -webkit-animation:bl 1s step-start infinite; animation:bl 1s step-start infinite; }
.dot:nth-child(2){ -webkit-animation-delay:.2s; animation-delay:.2s; }
.dot:nth-child(3){ -webkit-animation-delay:.4s; animation-delay:.4s; }
@-webkit-keyframes bl { 50%{ background:#bbb; } }
@keyframes bl { 50%{ background:#bbb; } }
.ld span { font-family:"Courier New",monospace; font-size:11px; letter-spacing:.06em; }

.rarea { border-top:3px solid #000; display:none; -webkit-flex-direction:column; flex-direction:column; overflow-y:auto; -webkit-flex-shrink:0; flex-shrink:0; max-height:52%; }
.rarea.on { display:-webkit-box; display:-webkit-flex; display:flex; }
.rhdr { font-family:"Courier New",monospace; font-size:10px; color:#555; letter-spacing:.1em; text-transform:uppercase; padding:8px 14px; border-bottom:2px solid #000; -webkit-flex-shrink:0; flex-shrink:0; background:#fff; position:-webkit-sticky; position:sticky; top:0; }
.ri { border-bottom:2px solid #000; padding:12px 14px; background:#fff; min-height:58px; display:-webkit-box; display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; gap:2px; cursor:pointer; -webkit-flex-shrink:0; flex-shrink:0; }
.ri:last-child { border-bottom:none; }
.ri:active { background:#000; color:#fff; }
.ri:active .ri-m { color:#bbb; }
.ri:active .ri-badge { border-color:#fff; color:#fff; }
.ri-t { font-size:14px; font-weight:700; }
.ri-m { font-size:11px; color:#555; }
.ri-badge { display:inline-block; font-family:"Courier New",monospace; font-size:9px; font-weight:700; letter-spacing:.06em; border:2px solid #000; padding:1px 5px; margin-top:3px; -webkit-align-self:flex-start; align-self:flex-start; }
.empty { display:none; border:3px dashed #000; margin:14px; padding:20px; text-align:center; font-size:13px; color:#555; }
.empty.on { display:block; }

/* reader screen */
#page-area {
  -webkit-flex:1; flex:1; min-height:0;
  display:-webkit-box; display:-webkit-flex; display:flex;
  -webkit-flex-direction:column; flex-direction:column;
  overflow:hidden; position:relative; background:#fff;
}
#bl {
  -webkit-flex:1; flex:1; min-height:0;
  display:-webkit-box; display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  font-family:"Courier New",monospace; font-size:12px;
  color:#555; letter-spacing:.06em; text-align:center; padding:20px; line-height:1.8;
}
#bl.off { display:none; }

/* #bt — the readable page. padding mirrored in JS */
#bt {
  font-family:Georgia,"Times New Roman",serif; font-size:1.0rem; line-height:1.8;
  padding:18px 20px; -webkit-flex:1; flex:1; min-height:0;
  overflow:hidden; display:none; background:#fff; color:#000;
  word-wrap:break-word; overflow-wrap:break-word;
}
.ch {
  display:block; font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
  font-size:0.82em; font-weight:700; text-align:center; letter-spacing:.14em;
  text-transform:uppercase; border-top:2px solid #000; border-bottom:2px solid #000;
  padding:7px 0; margin:12px 0 10px;
}

.nav {
  border-top:3px solid #000; padding:8px 10px;
  display:-webkit-box; display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  gap:6px; background:#fff; -webkit-flex-shrink:0; flex-shrink:0;
}
.nav .btn { min-width:86px; min-height:46px; font-size:12px; }
#pi { -webkit-flex:1; flex:1; text-align:center; font-family:"Courier New",monospace; font-size:11px; color:#555; letter-spacing:.06em; line-height:1.4; }

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:#fff; border-left:2px solid #000; }
::-webkit-scrollbar-thumb { background:#000; }
</style>
</head>
<body>
<div class="frame">

  <div id="ss">
    <div class="hero">
      <div class="hero-sub">Welcome to</div>
      <div class="hero-title">Readever</div>
      <div class="sbar">
        <div style="position:relative;-webkit-flex:1;flex:1;display:-webkit-box;display:-webkit-flex;display:flex;">
          <input id="si" type="text" placeholder="what do you want to read?"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
          <div id="sug"></div>
        </div>
        <button class="sbar-go" id="sb">&#8594;</button>
      </div>
      <div id="smsg"></div>
      <div class="ld" id="ld">
        <div style="display:-webkit-box;display:-webkit-flex;display:flex;gap:5px;">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <span id="ldmsg">Searching...</span>
      </div>
    </div>
    <div class="rarea" id="ra">
      <div class="rhdr" id="rh"></div>
      <div id="rl"></div>
      <div class="empty" id="em">[ No books found. Try another search. ]</div>
    </div>
  </div>

  <div id="rs">
    <div class="tbar">
      <button class="btn" id="fd" style="min-width:40px;font-size:15px;">A&#8722;</button>
      <button class="btn" id="fu" style="min-width:40px;font-size:15px;">A+</button>
      <div class="tfill">
        <div class="tb-track"><div class="tb-fill" id="pf"></div></div>
      </div>
      <span class="tb-pct" id="pp">0%</span>
      <button class="btn" id="back2" style="min-width:54px;font-size:11px;">&#8592; LIST</button>
    </div>
    <div id="page-area">
      <div id="bl">[ Loading... ]</div>
      <div id="bt"></div>
    </div>
    <div class="nav">
      <button class="btn" id="pv" disabled>&#9664; PREV</button>
      <span id="pi">&#8212; / &#8212;</span>
      <button class="btn" id="nx" disabled>NEXT &#9654;</button>
    </div>
  </div>

</div>
<script>
'use strict';

/*
  ALL network calls go through allorigins.win/raw.
  This is the same proxy already proven to work for search.
  It bypasses every CORS issue regardless of Kindle model or
  whether the page is served from file://, http://, or https://.

  Search:  allorigins → gutendex.com (tiny JSON)
  Books:   allorigins → gutenberg.org text file (raw plain text)

  No epub.js. No JSZip. No extra dependencies.
  Back to the proven text+paginator approach, just with a
  working proxy for every single request.
*/

var PROXY    = 'https://api.allorigins.win/raw?url=';
var GDEX     = 'https://gutendex.com/books/';
var SAVE_KEY = 'readever_v4';

function gid(id){ return document.getElementById(id); }

var ss=gid('ss'), rs=gid('rs'), si=gid('si'), sug=gid('sug');
var smsg=gid('smsg'), ldEl=gid('ld'), ldmsg=gid('ldmsg');
var rl=gid('rl'), ra=gid('ra'), rh=gid('rh'), em=gid('em');
var bl=gid('bl'), bt=gid('bt'), pf=gid('pf'), pp=gid('pp');
var pi=gid('pi'), pv=gid('pv'), nx=gid('nx'), pa=gid('page-area');

var paras=[], pages=[], cur=0, fs=1.0;
var bookId=null, busy=false, debT=null, touchX=0;

/* ── PROGRESS ── */
function pLoad(){ try{ return JSON.parse(localStorage.getItem(SAVE_KEY)||'{}'); }catch(e){ return {}; } }
function pSave(bid,page){
  try{
    var d=pLoad(); d[bid]={p:page,t:Date.now()};
    var keys=Object.keys(d).sort(function(a,b){ return (d[b].t||0)-(d[a].t||0); });
    if(keys.length>40){ for(var i=40;i<keys.length;i++) delete d[keys[i]]; }
    localStorage.setItem(SAVE_KEY,JSON.stringify(d));
  }catch(e){}
}
function pGet(bid){ try{ var d=pLoad(); return d[bid]?d[bid].p||0:0; }catch(e){ return 0; } }

/* ── XHR via allorigins ── */
function get(url, cb){
  /* Always proxy through allorigins — works for both JSON APIs and plain text files */
  var proxied = PROXY + encodeURIComponent(url);
  var x = new XMLHttpRequest();
  x.open('GET', proxied, true);
  x.timeout = 30000;
  x.onreadystatechange = function(){
    if(x.readyState !== 4) return;
    var ok = (x.status === 200 || x.status === 0) && x.responseText && x.responseText.length > 10;
    cb(ok ? x.responseText : null);
  };
  x.onerror   = function(){ cb(null); };
  x.ontimeout = function(){ cb(null); };
  x.send();
}

/* ── SEARCH ── */
si.addEventListener('input', function(){
  var q=si.value.trim(); clearTimeout(debT);
  if(q.length<2){ hideSug(); return; }
  debT=setTimeout(function(){ suggest(q); }, 400);
});
si.addEventListener('keydown', function(e){
  if((e.key||'')==='Enter'||e.keyCode===13){ hideSug(); doSearch(); }
});
gid('sb').addEventListener('click', function(){ hideSug(); doSearch(); });
function hideSug(){ sug.className=''; }

function suggest(q){
  get(GDEX+'?search='+encodeURIComponent(q)+'&page=1', function(txt){
    if(!txt){ hideSug(); return; }
    try{
      var items=(JSON.parse(txt).results||[]).slice(0,5);
      if(!items.length){ hideSug(); return; }
      sug.innerHTML='';
      for(var i=0;i<items.length;i++){
        (function(b){
          var el=document.createElement('div'); el.className='si';
          var a=b.authors&&b.authors[0]?b.authors[0].name:'';
          el.innerHTML='<span>'+esc(b.title)+'</span><span class="si-auth">'+esc(a)+'</span>';
          el.onclick=function(){ si.value=b.title; hideSug(); openBook(b); };
          sug.appendChild(el);
        })(items[i]);
      }
      sug.className='open';
    }catch(e){ hideSug(); }
  });
}

function doSearch(){
  var q=si.value.trim(); if(!q) return;
  rl.innerHTML=''; em.className='empty'; ra.className='rarea';
  ldmsg.textContent='Searching\u2026'; ldEl.className='ld on'; smsg.textContent='';
  get(GDEX+'?search='+encodeURIComponent(q)+'&page=1', function(txt){
    ldEl.className='ld'; ra.className='rarea on';
    if(!txt){ smsg.textContent='Search failed. Check your connection.'; return; }
    try{
      var books=JSON.parse(txt).results||[];
      if(!books.length){ em.className='empty on'; return; }
      rh.textContent=books.length+' result'+(books.length>1?'s':'')+' found';
      var prog=pLoad(), frag=document.createDocumentFragment();
      for(var i=0;i<books.length;i++){
        (function(b){
          var el=document.createElement('div'); el.className='ri';
          var a=b.authors&&b.authors.length?b.authors.map(function(x){return x.name;}).join(', '):'Unknown';
          var bid=String(b.id), saved=prog[bid]&&prog[bid].p>0;
          el.innerHTML='<div class="ri-t">'+esc(b.title)+'</div>'+
            '<div class="ri-m">'+esc(a)+' &middot; '+((b.download_count||0).toLocaleString())+' reads</div>'+
            (saved?'<span class="ri-badge">Resume p.'+(prog[bid].p+1)+'</span>':'');
          el.onclick=function(){ openBook(b); };
          frag.appendChild(el);
        })(books[i]);
      }
      rl.appendChild(frag);
    }catch(e){ smsg.textContent='Error reading results.'; }
  });
}

/* ── OPEN BOOK ── */
function openBook(b){
  bookId=String(b.id);
  paras=[]; pages=[]; cur=0; busy=false;
  bt.innerHTML=''; bt.style.display='none';
  bl.textContent='[ Loading\u2026 ]'; bl.className='';
  pv.disabled=true; nx.disabled=true;
  pi.textContent='\u2014 / \u2014';
  pf.style.width='0%'; pp.textContent='0%';
  ss.className='off'; rs.className='on';

  /*
    Text URL priority — all fetched via allorigins proxy:
    1. URL from gutendex formats object (text/plain variants)
    2. gutenberg.org/files/{id}/{id}-0.txt  (most common, UTF-8)
    3. gutenberg.org/files/{id}/{id}.txt    (older books)
    4. gutenberg.org/cache/epub/{id}/pg{id}.txt (cache mirror)

    allorigins handles all of these identically — it just fetches
    the URL server-side and returns the body, so CORS is irrelevant.
  */
  var fmtUrl = bestTxtUrl(b.formats);
  var id = bookId;
  var urls = [];
  if(fmtUrl) urls.push(fmtUrl);
  urls.push('https://www.gutenberg.org/files/'+id+'/'+id+'-0.txt');
  urls.push('https://www.gutenberg.org/files/'+id+'/'+id+'.txt');
  urls.push('https://www.gutenberg.org/cache/epub/'+id+'/pg'+id+'.txt');

  /* dedupe while preserving order */
  var seen={}, uniq=[];
  for(var i=0;i<urls.length;i++){
    if(!seen[urls[i]]){ seen[urls[i]]=1; uniq.push(urls[i]); }
  }

  tryUrls(uniq, 0);
}

function bestTxtUrl(f){
  var order=['text/plain; charset=utf-8','text/plain; charset=us-ascii','text/plain'];
  for(var i=0;i<order.length;i++){ if(f[order[i]]) return f[order[i]]; }
  var keys=Object.keys(f);
  for(var j=0;j<keys.length;j++){
    if(keys[j].indexOf('text/plain')===0) return f[keys[j]];
  }
  return null;
}

function tryUrls(urls, idx){
  if(idx>=urls.length){
    showErr('Could not load book.\nCheck your connection and try again.');
    return;
  }
  bl.textContent='[ Fetching'+(idx>0?' (mirror '+idx+')':'')+'\u2026 ]';
  get(urls[idx], function(txt){
    /* Gutenberg text files are always >10KB. Reject tiny responses. */
    if(txt && txt.length > 5000){
      processText(txt);
    } else {
      tryUrls(urls, idx+1);
    }
  });
}

/* ── TEXT PROCESSING ── */
function processText(raw){
  var t=raw;
  var s=t.search(/\*{3}\s*START OF (THE|THIS) PROJECT GUTENBERG/i);
  if(s!==-1) t=t.slice(t.indexOf('\n',s)+1);
  var en=t.search(/\*{3}\s*END OF (THE|THIS) PROJECT GUTENBERG/i);
  if(en!==-1) t=t.slice(0,en);
  t=t.trim();

  var rawParas=t.split(/\n{2,}/);
  paras=[];

  for(var i=0;i<rawParas.length;i++){
    var trimmed=rawParas[i].trim();
    if(!trimmed||trimmed.length<2) continue;
    var isHeader=
      /^(CHAPTER|PART|BOOK|SECTION|PROLOGUE|EPILOGUE|PREFACE|APPENDIX|VOLUME)\b/i.test(trimmed)||
      (trimmed.length<100&&trimmed===trimmed.toUpperCase()&&/[A-Z]{3}/.test(trimmed)&&!/[.;]/.test(trimmed));
    if(isHeader){ paras.push('<span class="ch">'+esc(trimmed)+'</span>'); continue; }

    var lines=trimmed.split('\n'), joined='';
    for(var j=0;j<lines.length;j++){
      var line=lines[j].trim(); if(!line) continue;
      if(!joined){ joined=line; continue; }
      if(/[.!?"'\)\]\u2014]$/.test(joined)&&/^[A-Z"'\(\[]/.test(line)){
        pushPara(joined); joined=line;
      } else { joined+=' '+line; }
    }
    if(joined) pushPara(joined);
  }

  bl.className='off';
  bt.style.display='block';
  waitLayout(function(){ paginate(function(){ render(pGet(bookId)); }); });
}

function pushPara(text){
  if(text.length<=360){ paras.push(esc(text)); return; }
  var sentences=text.match(/[^.!?]+[.!?]+['")\]]?\s*/g)||[text];
  var chunk='';
  for(var i=0;i<sentences.length;i++){
    var s=sentences[i];
    if((chunk+s).length>340&&chunk){ paras.push(esc(chunk.trim())); chunk=s; }
    else { chunk+=s; }
  }
  if(chunk.trim()) paras.push(esc(chunk.trim()));
}

function waitLayout(cb){
  var tries=0;
  function check(){
    tries++;
    if((pa.offsetHeight>80&&bt.offsetWidth>80)||tries>=30){ cb(); }
    else { setTimeout(check,60); }
  }
  setTimeout(check,80);
}

/* ── PAGINATION ── */
function paginate(done){
  if(busy) return;
  busy=true; pages=[];
  if(!paras.length){ busy=false; done(); return; }

  var m=document.createElement('div');
  m.style.cssText=[
    'position:absolute','top:0','left:0','visibility:hidden','pointer-events:none',
    'font-family:Georgia,"Times New Roman",serif',
    'font-size:'+fs+'rem','line-height:1.8','padding:18px 20px',
    'word-wrap:break-word','overflow-wrap:break-word','overflow:hidden','background:#fff',
    'width:'+pa.offsetWidth+'px','height:'+pa.offsetHeight+'px'
  ].join(';');
  pa.appendChild(m);

  var total=paras.length, pageStart=0, i=0;
  while(i<total){
    var div=document.createElement('div');
    div.style.marginBottom='0.7em';
    div.innerHTML=paras[i];
    m.appendChild(div);
    if(m.scrollHeight>m.clientHeight+2){
      if(i===pageStart){ pages.push({start:pageStart,end:i+1}); pageStart=i+1; }
      else{ pages.push({start:pageStart,end:i}); pageStart=i; }
      m.innerHTML=''; i=pageStart;
    } else { i++; }
  }
  if(pageStart<total) pages.push({start:pageStart,end:total});
  if(!pages.length)   pages.push({start:0,end:total});
  pa.removeChild(m);
  busy=false; done();
}

/* ── RENDER ── */
function render(n){
  if(!pages.length) return;
  n=n<0?0:n>=pages.length?pages.length-1:n;
  cur=n;
  var sl=pages[n]; bt.style.fontSize=fs+'rem';
  var html='';
  for(var i=sl.start;i<sl.end;i++) html+='<div style="margin-bottom:0.7em">'+paras[i]+'</div>';
  bt.innerHTML=html;
  pv.disabled=(n===0); nx.disabled=(n===pages.length-1);
  pi.textContent='Page '+(n+1)+' of '+pages.length;
  var pct=pages.length>1?Math.round((n/(pages.length-1))*100):100;
  pf.style.width=pct+'%'; pp.textContent=pct+'%';
  if(bookId) pSave(bookId,n);
  if(n>0&&n%15===0) einkFlash();
}

function showErr(msg){
  bl.className='';
  bt.style.display='none';
  bl.innerHTML=msg.replace(/\n/g,'<br>');
}

/* ── NAVIGATION ── */
pv.onclick=function(){ if(cur>0) render(cur-1); };
nx.onclick=function(){ if(cur<pages.length-1) render(cur+1); };
gid('back2').onclick=function(){ rs.className=''; ss.className=''; };

gid('page-area').addEventListener('touchstart',function(ev){ touchX=ev.changedTouches[0].clientX; },{passive:true});
gid('page-area').addEventListener('touchend',function(ev){
  var dx=ev.changedTouches[0].clientX-touchX;
  if(dx<-50&&cur<pages.length-1) render(cur+1);
  if(dx>50&&cur>0) render(cur-1);
},{passive:true});

document.addEventListener('keydown',function(e){
  if(rs.className.indexOf('on')===-1) return;
  var k=e.key||'';
  if(k==='ArrowRight'||k==='ArrowDown'||e.keyCode===39||e.keyCode===40){ if(cur<pages.length-1) render(cur+1); }
  if(k==='ArrowLeft'||k==='ArrowUp'||e.keyCode===37||e.keyCode===38){ if(cur>0) render(cur-1); }
});

/* ── FONT SIZE ── */
gid('fu').onclick=function(){ if(fs<1.8){ fs=Math.round((fs+0.1)*10)/10; repaginate(); } };
gid('fd').onclick=function(){ if(fs>0.7){ fs=Math.round((fs-0.1)*10)/10; repaginate(); } };
function repaginate(){
  if(!paras.length) return;
  busy=false;
  var savedStart=pages[cur]?pages[cur].start:0;
  paginate(function(){
    var target=0;
    for(var i=0;i<pages.length;i++){ if(pages[i].end>savedStart){ target=i; break; } }
    render(target);
  });
}

var resizeT;
window.addEventListener('resize',function(){
  clearTimeout(resizeT);
  resizeT=setTimeout(function(){ if(paras.length&&rs.className.indexOf('on')!==-1) repaginate(); },350);
});

/* ── E-INK FLASH ── */
var lastFlash=0;
function einkFlash(){
  var now=Date.now(); if(now-lastFlash<30000) return; lastFlash=now;
  try{ if(localStorage.getItem('rekindle_display_mode')==='screen') return; }catch(e){}
  var f=document.createElement('div');
  f.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;pointer-events:none;';
  document.body.appendChild(f); void f.offsetWidth;
  setTimeout(function(){ if(f.parentNode) f.parentNode.removeChild(f); },400);
}

document.addEventListener('click',function(ev){
  if(!ev.target.closest||!ev.target.closest('.sbar')) hideSug();
});

function esc(s){
  return String(s).replace(/[&<"]/g,function(m){ return{'&':'&amp;','<':'&lt;','"':'&quot;'}[m]; });
}
</script>
</body>
</html>
