<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Readever</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --k: #000;
  --w: #fff;
  --g: #555;
  --d: #bbb;
  --ui: 'IBM Plex Sans', Arial, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --body: 'Lora', Georgia, serif;

  /* Kindle PW 11 logical canvas — FIXED dimensions */
  --kw: 758px;
  --kh: 1024px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%;
  height: 100%;
  min-height: 100vh;
  background: #888;
  background-image: conic-gradient(#000 25%,#fff 0 50%,#000 0 75%,#fff 0);
  background-size: 6px 6px;
  image-rendering: pixelated;
  font-family: var(--ui);
  font-size: 16px;
  color: var(--k);
  overflow: hidden; /* no body scroll at all */
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── KINDLE FRAME ──
   Desktop: fixed 758×1024 box, centred, never scrolls.
   Mobile (≤800px): full viewport, responsive.
*/
.kindle-frame {
  width: var(--kw);
  height: var(--kh);
  background: var(--w);
  border: 3px solid var(--k);
  box-shadow: 7px 7px 0 var(--k);
  display: flex;
  flex-direction: column;
  overflow: hidden; /* the frame itself NEVER scrolls */
  flex-shrink: 0;
  position: relative;
}

@media (max-width: 800px) {
  html, body { overflow: hidden; }
  .kindle-frame {
    width: 100vw;
    height: 100dvh; /* dynamic viewport height — respects mobile browser chrome */
    border: none;
    box-shadow: none;
  }
}

/* ── TITLE BAR ── */
.tbar {
  border-bottom: 3px solid var(--k);
  height: 46px;
  display: flex;
  align-items: center;
  padding: 0 5px;
  gap: 0;
  overflow: hidden;
  user-select: none;
  flex-shrink: 0;
}
.tfill {
  flex: 1;
  height: 12px;
  background: repeating-linear-gradient(180deg,var(--k) 0 2px,var(--w) 2px 4px);
  margin: 0 5px;
}
.ttxt {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.07em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 52vw;
  padding: 0 8px;
  background: var(--w);
  z-index: 1;
}

/* ── BUTTONS ── */
.btn {
  background: var(--w);
  border: 3px solid var(--k);
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--k);
  cursor: pointer;
  min-width: 46px;
  min-height: 36px;
  padding: 4px 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-shadow: 3px 3px 0 var(--k);
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.05em;
  position: relative;
}
.btn::after { content:''; position:absolute; inset:-10px; }
.btn:active { box-shadow:none; transform:translate(3px,3px); background:var(--k); color:var(--w); }
.btn:disabled { color:var(--d); border-color:var(--d); box-shadow:none; pointer-events:none; }

/* ── SCREENS ── */
#ss, #rs { display:flex; flex-direction:column; flex:1; min-height:0; }
#ss.off { display:none; }
#rs { display:none; }
#rs.on { display:flex; }

/* ══════════════ SEARCH SCREEN ══════════════ */
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 24px 40px;
  overflow: hidden;
}
.hero-sub {
  font-family: var(--ui);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: var(--g);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.hero-title {
  font-family: var(--ui);
  font-size: 46px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 28px;
  line-height: 1;
}

.sbar {
  width: 100%;
  max-width: 420px;
  display: flex;
  border: 3px solid var(--k);
  box-shadow: 4px 4px 0 var(--k);
  position: relative;
}
.sbar input {
  flex: 1;
  border: none;
  outline: none;
  font-family: var(--ui);
  font-size: 15px;
  padding: 14px 12px;
  min-height: 52px;
  background: var(--w);
  color: var(--k);
  -webkit-appearance: none;
}
.sbar-btn {
  background: var(--k);
  border: none;
  border-left: 3px solid var(--k);
  min-width: 56px;
  min-height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
  color: var(--w);
  flex-shrink: 0;
  position: relative;
}
.sbar-btn::after { content:''; position:absolute; inset:-10px; }
.sbar-btn:active { background: var(--g); }

#sug {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: -59px;
  background: var(--w);
  border: 3px solid var(--k);
  box-shadow: 4px 4px 0 var(--k);
  z-index: 200;
  max-height: 260px;
  overflow-y: auto;
}
#sug.open { display: block; }
.si {
  padding: 12px;
  border-bottom: 2px solid var(--k);
  display: flex;
  align-items: baseline;
  gap: 8px;
  min-height: 50px;
  font-size: 14px;
  cursor: pointer;
}
.si:last-child { border-bottom: none; }
.si:active { background: var(--k); color: var(--w); }
.si-auth { font-size: 11px; color: var(--g); margin-left: auto; white-space: nowrap; font-style: italic; }
.si:active .si-auth { color: var(--d); }

#smsg { font-size: 13px; color: var(--g); margin-top: 10px; text-align: center; min-height: 18px; }
.ld { display:none; align-items:center; gap:10px; justify-content:center; margin-top:12px; }
.ld.on { display:flex; }
.dot { width:9px; height:9px; background:var(--k); animation:bl 1s step-start infinite; }
.dot:nth-child(2){ animation-delay:.2s; }
.dot:nth-child(3){ animation-delay:.4s; }
@keyframes bl { 50%{ background:var(--d); } }
.ld span { font-family:var(--mono); font-size:11px; letter-spacing:.06em; }

/* Results — scrollable within fixed frame */
.rarea {
  border-top: 3px solid var(--k);
  display: none;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
  max-height: 50%; /* half the frame max */
}
.rarea.on { display:flex; }
.rhdr {
  font-family:var(--mono);
  font-size:10px;
  color:var(--g);
  letter-spacing:.1em;
  text-transform:uppercase;
  padding:8px 14px;
  border-bottom: 2px solid var(--k);
  flex-shrink: 0;
  background: var(--w);
  position: sticky;
  top: 0;
}
.ri {
  border-bottom: 2px solid var(--k);
  padding: 12px 14px;
  background: var(--w);
  min-height: 58px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  cursor: pointer;
  flex-shrink: 0;
}
.ri:last-child { border-bottom: none; }
.ri:active { background:var(--k); color:var(--w); }
.ri:active .ri-m { color:var(--d); }
.ri-t { font-size:14px; font-weight:700; }
.ri-m { font-size:11px; color:var(--g); }
.empty { display:none; border:3px dashed var(--k); margin:14px; padding:20px; text-align:center; font-size:13px; color:var(--g); }
.empty.on { display:block; }

/* ══════════════ READER SCREEN ══════════════ */

/* Progress bar */
.prog {
  border-bottom: 3px solid var(--k);
  height: 24px;
  background: var(--w);
  position: relative;
  flex-shrink: 0;
}
.pf { height:100%; background:var(--k); width:0%; transition: width 0.15s; }
.pt {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:10px; font-weight:700;
  letter-spacing:.06em; color:var(--w); mix-blend-mode:difference;
  pointer-events:none;
}

/* Font controls */
.frow {
  display:flex; gap:6px; align-items:center;
  padding:6px 10px;
  border-bottom: 2px dashed var(--k);
  flex-shrink: 0;
}
.frow .btn { min-width:50px; min-height:36px; }
.flbl { font-family:var(--mono); font-size:10px; color:var(--g); margin-right:auto; letter-spacing:.07em; }

/* ── PAGE AREA ──
   This is the CRITICAL region.
   It takes all remaining vertical space between the controls bar
   and the nav bar. NEVER scrolls. Pagination fills it exactly.
*/
#page-area {
  flex: 1;
  min-height: 0;        /* critical flex child — allows shrinking below content size */
  display: flex;
  flex-direction: column;
  overflow: hidden;     /* hard clip — no scroll, ever */
  position: relative;
  background: var(--w);
}

/* Loading indicator */
#bl {
  display: none;
  flex: 1;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--g);
  letter-spacing: .06em;
}
#bl.on { display: flex; }

/*
  #bt — The rendered page of text.
  overflow: hidden — text that doesn't fit is invisible (clipped),
  never scrolled. The pagination engine ensures content NEVER exceeds
  the available height, so clipping is only a safety net.
*/
#bt {
  font-family: var(--body);
  font-size: 1.0rem;
  line-height: 1.85;
  padding: 18px 22px;
  flex: 1;
  min-height: 0;
  overflow: hidden;     /* HARD CLIP — never scroll */
  display: none;
  background: var(--w);
  color: var(--k);
  word-wrap: break-word;
  overflow-wrap: break-word;
}

/* Chapter heading inside text */
.ch {
  display: block;
  font-family: var(--ui);
  font-size: 0.85em;
  font-weight: 700;
  text-align: center;
  letter-spacing: .16em;
  text-transform: uppercase;
  border-top: 2px solid var(--k);
  border-bottom: 2px solid var(--k);
  padding: 7px 0;
  margin: 14px 0 10px;
}

/* Nav bar — always at the bottom of the frame */
.nav {
  border-top: 3px solid var(--k);
  padding: 8px 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--w);
  flex-shrink: 0;
}
.nav .btn { min-width:86px; min-height:46px; font-size:12px; }
#pi { flex:1; text-align:center; font-family:var(--mono); font-size:11px; color:var(--g); letter-spacing:.06em; line-height:1.4; }

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--w); border-left:2px solid var(--k); }
::-webkit-scrollbar-thumb { background:var(--k); }
</style>
</head>
<body>

<div class="kindle-frame">

  <!-- ══ SEARCH SCREEN ══ -->
  <div id="ss">
    <div class="hero">
      <div class="hero-sub">Welcome to</div>
      <div class="hero-title">Readever</div>

      <div class="sbar">
        <div style="position:relative;flex:1;display:flex;">
          <input id="si" type="text" placeholder="what do you want to read?"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
          <div id="sug"></div>
        </div>
        <button class="sbar-btn" id="sb">→</button>
      </div>

      <div id="smsg"></div>
      <div class="ld" id="ld">
        <div style="display:flex;gap:5px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <span>Searching...</span>
      </div>
    </div>

    <div class="rarea" id="ra">
      <div class="rhdr" id="rh"></div>
      <div id="rl"></div>
      <div class="empty" id="em">[ No books found. Try another search. ]</div>
    </div>
  </div>

  <!-- ══ READER SCREEN ══ -->
  <div id="rs">
    <div class="tbar">
      <div class="tfill"></div>
      <button class="btn" id="back2" style="min-width:54px;font-size:11px;">← LIST</button>
    </div>

    <div class="prog">
      <div class="pf" id="pf"></div>
      <div class="pt" id="pp">0%</div>
    </div>

    <div class="frow">
      <span class="flbl">FONT SIZE</span>
      <button class="btn" id="fd">A−</button>
      <button class="btn" id="fu">A+</button>
    </div>

    <!-- ── PAGE AREA: fills ALL remaining space, never scrolls ── -->
    <div id="page-area">
      <div id="bl" class="on">[ Loading... ]</div>
      <div id="bt"></div>
    </div>

    <div class="nav">
      <button class="btn" id="pv" disabled>◄ PREV</button>
      <span id="pi">— / —</span>
      <button class="btn" id="nx" disabled>NEXT ►</button>
    </div>
  </div>

</div><!-- /.kindle-frame -->

<script>
'use strict';

const API = 'https://gutendex.com/books/';
const PRX = 'https://corsproxy.io/?';

// ── DOM refs ──
const $ = id => document.getElementById(id);
const ss=$('ss'), rs=$('rs'), si=$('si'), sug=$('sug'),
      smsg=$('smsg'), ld=$('ld'), rl=$('rl'), ra=$('ra'),
      rh=$('rh'), em=$('em'), bl=$('bl'),
      bt=$('bt'), pf=$('pf'), pp=$('pp'), pi=$('pi'),
      pv=$('pv'), nx=$('nx'), pageArea=$('page-area');

// ── State ──
let debT = null;
let allParagraphs = [];   // array of HTML strings
let pages = [];           // array of {start, end} paragraph index ranges
let cur = 0;
let fs = 1.0;             // rem multiplier
let paginating = false;

// ═══════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════

si.addEventListener('input', () => {
  const q = si.value.trim();
  clearTimeout(debT);
  if (q.length < 2) { hideSug(); return; }
  debT = setTimeout(() => suggest(q), 360);
});
si.addEventListener('keydown', e => { if (e.key === 'Enter') { hideSug(); search(); } });
$('sb').addEventListener('click', () => { hideSug(); search(); });

async function suggest(q) {
  try {
    const d = await (await fetch(`${API}?search=${encodeURIComponent(q)}&page=1`)).json();
    const items = (d.results || []).slice(0, 6);
    if (!items.length) { hideSug(); return; }
    sug.innerHTML = '';
    items.forEach(b => {
      const el = document.createElement('div');
      el.className = 'si';
      const a = b.authors[0]?.name || '';
      el.innerHTML = `<span>${esc(b.title)}</span><span class="si-auth">${esc(a)}</span>`;
      el.onclick = () => { si.value = b.title; hideSug(); openBook(b); };
      sug.appendChild(el);
    });
    sug.classList.add('open');
  } catch(_) { hideSug(); }
}
function hideSug() { sug.classList.remove('open'); }

async function search() {
  const q = si.value.trim(); if (!q) return;
  rl.innerHTML = ''; em.classList.remove('on'); ra.classList.remove('on');
  ld.classList.add('on'); smsg.textContent = '';
  try {
    const d = await (await fetch(`${API}?search=${encodeURIComponent(q)}&page=1`)).json();
    const books = d.results || [];
    ld.classList.remove('on');
    ra.classList.add('on');
    if (!books.length) { em.classList.add('on'); return; }
    rh.textContent = `${books.length} result${books.length > 1 ? 's' : ''} found`;
    books.forEach(b => {
      const el = document.createElement('div');
      el.className = 'ri';
      const a = b.authors.map(x => x.name).join(', ') || 'Unknown';
      el.innerHTML = `<div class="ri-t">${esc(b.title)}</div>
                      <div class="ri-m">${esc(a)} · ${(b.download_count||0).toLocaleString()} reads</div>`;
      el.onclick = () => openBook(b);
      rl.appendChild(el);
    });
  } catch(_) {
    ld.classList.remove('on');
    smsg.textContent = 'Could not reach server.';
    ra.classList.add('on');
  }
}

// ═══════════════════════════════════════════════
// OPEN BOOK
// ═══════════════════════════════════════════════

async function openBook(b) {
  // Reset state
  bt.innerHTML = '';
  bt.style.display = 'none';
  bl.classList.add('on');
  allParagraphs = []; pages = []; cur = 0;
  pv.disabled = true; nx.disabled = true;
  pi.textContent = '— / —';
  pf.style.width = '0%'; pp.textContent = '0%';

  // Switch to reader screen
  ss.classList.add('off');
  rs.classList.add('on');

  const url = bestUrl(b.formats);
  if (!url) { showErr('No text version available.'); return; }

  try {
    let txt = null;
    // Try direct first, then via CORS proxy
    try {
      const r = await fetch(url, { mode: 'cors' });
      if (r.ok) txt = await r.text();
    } catch(_) {}

    if (!txt) {
      const r = await fetch(PRX + encodeURIComponent(url));
      if (!r.ok) throw new Error('proxy failed');
      txt = await r.text();
    }

    processText(txt);
  } catch(_) {
    showErr('Could not load book. Check your connection.');
  }
}

function bestUrl(f) {
  for (const m of ['text/plain; charset=utf-8','text/plain; charset=us-ascii','text/plain'])
    if (f[m]) return f[m];
  const k = Object.keys(f).find(k => k.startsWith('text/plain'));
  return k ? f[k] : null;
}

// ═══════════════════════════════════════════════
// TEXT PROCESSING  →  paragraph array
// ═══════════════════════════════════════════════

function processText(raw) {
  let t = raw;

  // Strip Gutenberg header/footer
  const s = t.search(/\*{3}\s*START OF (THE|THIS) PROJECT GUTENBERG/i);
  if (s !== -1) t = t.slice(t.indexOf('\n', s) + 1);
  const en = t.search(/\*{3}\s*END OF (THE|THIS) PROJECT GUTENBERG/i);
  if (en !== -1) t = t.slice(0, en);
  t = t.trim();

  // Split on blank lines → logical paragraphs
  const rawParas = t.split(/\n{2,}/);

  allParagraphs = rawParas.map(p => {
    const trimmed = p.trim();
    if (!trimmed) return null;

    const isHeading =
      /^(chapter|part|book|section|prologue|epilogue|preface|appendix)\s+/i.test(trimmed) ||
      (trimmed.length < 70 && trimmed === trimmed.toUpperCase() && /[A-Z]{3}/.test(trimmed));

    if (isHeading) return `<span class="ch">${esc(trimmed)}</span>`;

    // Preserve mid-paragraph line breaks as single space (prose reflow)
    return esc(trimmed).replace(/\n/g, ' ');
  }).filter(Boolean);

  bl.classList.remove('on');
  bt.style.display = 'block';

  // Wait for the reader screen to fully paint before measuring.
  // We poll until pageArea has a real height (handles slow paints & font loads).
  waitForLayout(() => paginate(() => render(0)));
}

function waitForLayout(cb) {
  let tries = 0;
  function check() {
    tries++;
    // pageArea must have real height AND bt must have real width
    if (pageArea.offsetHeight > 100 && (bt.offsetWidth || pageArea.offsetWidth) > 100) {
      cb();
    } else if (tries < 40) {
      requestAnimationFrame(check);
    } else {
      // Timeout fallback — force a measurement anyway
      cb();
    }
  }
  requestAnimationFrame(check);
}

// ═══════════════════════════════════════════════
// PAGINATION ENGINE
// ═══════════════════════════════════════════════
/*
  Strategy:
  1. Measure the EXACT pixel height available inside #page-area
     (after subtracting bt's vertical padding).
  2. Use an off-screen probe element (same styling as #bt) placed
     inside #page-area so it inherits the correct width.
  3. Binary-search how many paragraphs fit without exceeding availH.
  4. Store {start, end} index pairs in `pages[]`.

  The probe is absolutely positioned (visibility:hidden, pointer-events:none)
  so it doesn't affect layout, but DOES inherit the correct computed width
  from its parent. This is the most accurate approach for variable-width
  layouts (e.g. mobile responsive).
*/

function paginate(done) {
  if (paginating) return;
  paginating = true;
  pages = [];

  // ── Measure the available height ──
  // pageArea is the flex child that holds #bt.
  // Its offsetHeight is the pixel budget for text content.
  // We subtract bt's top+bottom padding (18px × 2 = 36px).
  const PAD_V = 36;
  const areaH = pageArea.offsetHeight;
  const availH = areaH - PAD_V;

  // ── Measure the text column width ──
  // bt.offsetWidth is reliable once bt is display:block inside a visible parent.
  const colW = bt.offsetWidth || pageArea.offsetWidth || 714; // 758 - 2×22px padding

  console.log('[paginate] areaH=', areaH, 'availH=', availH, 'colW=', colW);

  if (availH <= 50 || !allParagraphs.length) {
    // Something went wrong with measurement — split into fixed-size chunks as fallback
    console.warn('[paginate] fallback: areaH too small or no paragraphs');
    const CHUNK = 8;
    for (let i = 0; i < allParagraphs.length; i += CHUNK) {
      pages.push({ start: i, end: Math.min(i + CHUNK, allParagraphs.length) });
    }
    paginating = false;
    done();
    return;
  }

  // ── Build an off-screen probe ──
  // Appended to document.body so it always has a real layout context.
  // Position fixed + visibility hidden = invisible but fully laid out.
  const probe = document.createElement('div');
  probe.setAttribute('aria-hidden', 'true');
  const computedFont = getComputedStyle(bt).fontFamily || "'Lora', Georgia, serif";
  probe.style.cssText = [
    'position: fixed',
    'top: -9999px',
    'left: -9999px',
    'visibility: hidden',
    'pointer-events: none',
    `width: ${colW}px`,
    `font-family: ${computedFont}`,
    `font-size: ${fs}rem`,
    'line-height: 1.85',
    'padding: 0',
    'margin: 0',
    'box-sizing: border-box',
    'word-wrap: break-word',
    'overflow-wrap: break-word',
    'overflow: visible',
    'white-space: normal',
  ].join(';');
  document.body.appendChild(probe);

  function measureRange(startIdx, count) {
    probe.innerHTML = allParagraphs
      .slice(startIdx, startIdx + count)
      .map(p => `<div style="margin-bottom:0.7em;">${p}</div>`)
      .join('');
    return probe.getBoundingClientRect().height || probe.scrollHeight;
  }

  const total = allParagraphs.length;
  let idx = 0;

  while (idx < total) {
    const remaining = total - idx;

    // Quick check: does everything remaining fit?
    if (measureRange(idx, remaining) <= availH) {
      pages.push({ start: idx, end: total });
      break;
    }

    // Binary search: find the max number of paragraphs that fit
    let lo = 1, hi = remaining, fit = 1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (measureRange(idx, mid) <= availH) {
        fit = mid;
        lo = mid + 1;
      } else {
        hi = mid - 1;
      }
    }

    if (fit < 1) fit = 1; // never get stuck
    pages.push({ start: idx, end: idx + fit });
    idx += fit;
  }

  document.body.removeChild(probe);
  console.log('[paginate] total pages=', pages.length);
  paginating = false;
  done();
}

// ═══════════════════════════════════════════════
// RENDER  —  paint page N
// ═══════════════════════════════════════════════

function render(n) {
  if (!pages.length) return;
  n = Math.max(0, Math.min(n, pages.length - 1));
  cur = n;

  const { start, end } = pages[n];
  bt.style.fontSize = `${fs}rem`;
  bt.innerHTML = allParagraphs
    .slice(start, end)
    .map(p => `<div style="margin-bottom:0.7em;">${p}</div>`)
    .join('');

  // Navigation
  pv.disabled = (n === 0);
  nx.disabled = (n === pages.length - 1);
  pi.textContent = `Page ${n + 1} of ${pages.length}`;

  // Progress bar
  const pct = pages.length > 1 ? Math.round((n / (pages.length - 1)) * 100) : 100;
  pf.style.width = `${pct}%`;
  pp.textContent = `${pct}%`;
}

function showErr(m) {
  bl.classList.remove('on');
  bt.style.display = 'block';
  bt.innerHTML = `<div style="color:#555;font-family:var(--mono);font-size:0.85rem;padding:20px;">[ ${esc(m)} ]</div>`;
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════

pv.onclick = () => { if (cur > 0) render(cur - 1); };
nx.onclick = () => { if (cur < pages.length - 1) render(cur + 1); };

$('back2').onclick = () => {
  rs.classList.remove('on');
  ss.classList.remove('off');
};

// Touch swipe (left = next, right = prev)
let touchStartX = 0;
rs.addEventListener('touchstart', ev => {
  touchStartX = ev.changedTouches[0].clientX;
}, { passive: true });

rs.addEventListener('touchend', ev => {
  const dx = ev.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0 && cur < pages.length - 1) render(cur + 1);
    if (dx > 0 && cur > 0) render(cur - 1);
  }
}, { passive: true });

// Keyboard arrows
document.addEventListener('keydown', e => {
  if (!rs.classList.contains('on')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (cur < pages.length - 1) render(cur + 1);
  }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (cur > 0) render(cur - 1);
  }
});

// ═══════════════════════════════════════════════
// FONT SIZE
// ═══════════════════════════════════════════════

$('fu').onclick = () => {
  if (fs < 1.8) { fs = +(fs + 0.1).toFixed(1); repaginate(); }
};
$('fd').onclick = () => {
  if (fs > 0.7) { fs = +(fs - 0.1).toFixed(1); repaginate(); }
};

function repaginate() {
  if (!allParagraphs.length) return;
  paginating = false; // reset lock so paginate() can run again
  const savedCur = cur;
  paginate(() => render(Math.min(savedCur, pages.length - 1)));
}

// Re-paginate on window resize (desktop)
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (allParagraphs.length && rs.classList.contains('on')) repaginate();
  }, 250);
});

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

document.addEventListener('click', ev => {
  if (!ev.target.closest('.sbar')) hideSug();
});
</script>
</body>
</html>
