<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Readever</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --k: #000;
  --w: #fff;
  --g: #555;
  --d: #bbb;
  --ui: 'IBM Plex Sans', Arial, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --body: 'Lora', Georgia, serif;

  --kw: 758px;
  --kh: 1024px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%;
  height: 100%;
  min-height: 100vh;
  background: #888;
  background-image: conic-gradient(#000 25%,#fff 0 50%,#000 0 75%,#fff 0);
  background-size: 6px 6px;
  image-rendering: pixelated;
  font-family: var(--ui);
  font-size: 16px;
  color: var(--k);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.kindle-frame {
  width: var(--kw);
  height: var(--kh);
  background: var(--w);
  border: 3px solid var(--k);
  box-shadow: 7px 7px 0 var(--k);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
}

@media (max-width: 800px) {
  html, body { overflow: hidden; }
  .kindle-frame {
    width: 100vw;
    height: 100dvh;
    border: none;
    box-shadow: none;
  }
}

/* ── TITLE BAR ── */
.tbar {
  border-bottom: 3px solid var(--k);
  height: 46px;
  display: flex;
  align-items: center;
  padding: 0 5px;
  gap: 0;
  overflow: hidden;
  user-select: none;
  flex-shrink: 0;
}
.tfill {
  flex: 1;
  height: 12px;
  background: repeating-linear-gradient(180deg,var(--k) 0 2px,var(--w) 2px 4px);
  margin: 0 5px;
}
.ttxt {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.07em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 52vw;
  padding: 0 8px;
  background: var(--w);
  z-index: 1;
}

/* ── BUTTONS ── */
.btn {
  background: var(--w);
  border: 3px solid var(--k);
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--k);
  cursor: pointer;
  min-width: 46px;
  min-height: 36px;
  padding: 4px 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-shadow: 3px 3px 0 var(--k);
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.05em;
  position: relative;
}
.btn::after { content:''; position:absolute; inset:-10px; }
.btn:active { box-shadow:none; transform:translate(3px,3px); background:var(--k); color:var(--w); }
.btn:disabled { color:var(--d); border-color:var(--d); box-shadow:none; pointer-events:none; }

/* ── SCREENS ── */
#ss, #rs { display:flex; flex-direction:column; flex:1; min-height:0; }
#ss.off { display:none; }
#rs { display:none; }
#rs.on { display:flex; }

/* ══ SEARCH SCREEN ══ */
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 24px 40px;
  overflow: hidden;
}
.hero-sub {
  font-family: var(--ui);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: var(--g);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.hero-title {
  font-family: var(--ui);
  font-size: 46px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 28px;
  line-height: 1;
}

.sbar {
  width: 100%;
  max-width: 420px;
  display: flex;
  border: 3px solid var(--k);
  box-shadow: 4px 4px 0 var(--k);
  position: relative;
}
.sbar input {
  flex: 1;
  border: none;
  outline: none;
  font-family: var(--ui);
  font-size: 15px;
  padding: 14px 12px;
  min-height: 52px;
  background: var(--w);
  color: var(--k);
  -webkit-appearance: none;
}
.sbar-btn {
  background: var(--k);
  border: none;
  border-left: 3px solid var(--k);
  min-width: 56px;
  min-height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
  color: var(--w);
  flex-shrink: 0;
  position: relative;
}
.sbar-btn::after { content:''; position:absolute; inset:-10px; }
.sbar-btn:active { background: var(--g); }

#sug {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: -59px;
  background: var(--w);
  border: 3px solid var(--k);
  box-shadow: 4px 4px 0 var(--k);
  z-index: 200;
  max-height: 260px;
  overflow-y: auto;
}
#sug.open { display: block; }
.si {
  padding: 12px;
  border-bottom: 2px solid var(--k);
  display: flex;
  align-items: baseline;
  gap: 8px;
  min-height: 50px;
  font-size: 14px;
  cursor: pointer;
}
.si:last-child { border-bottom: none; }
.si:active { background: var(--k); color: var(--w); }
.si-auth { font-size: 11px; color: var(--g); margin-left: auto; white-space: nowrap; font-style: italic; }
.si:active .si-auth { color: var(--d); }

#smsg { font-size: 13px; color: var(--g); margin-top: 10px; text-align: center; min-height: 18px; }
.ld { display:none; align-items:center; gap:10px; justify-content:center; margin-top:12px; }
.ld.on { display:flex; }
.dot { width:9px; height:9px; background:var(--k); animation:bl 1s step-start infinite; }
.dot:nth-child(2){ animation-delay:.2s; }
.dot:nth-child(3){ animation-delay:.4s; }
@keyframes bl { 50%{ background:var(--d); } }
.ld span { font-family:var(--mono); font-size:11px; letter-spacing:.06em; }

.rarea {
  border-top: 3px solid var(--k);
  display: none;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
  max-height: 50%;
}
.rarea.on { display:flex; }
.rhdr {
  font-family:var(--mono);
  font-size:10px;
  color:var(--g);
  letter-spacing:.1em;
  text-transform:uppercase;
  padding:8px 14px;
  border-bottom: 2px solid var(--k);
  flex-shrink: 0;
  background: var(--w);
  position: sticky;
  top: 0;
}
.ri {
  border-bottom: 2px solid var(--k);
  padding: 12px 14px;
  background: var(--w);
  min-height: 58px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  cursor: pointer;
  flex-shrink: 0;
}
.ri:last-child { border-bottom: none; }
.ri:active { background:var(--k); color:var(--w); }
.ri:active .ri-m { color:var(--d); }
.ri-t { font-size:14px; font-weight:700; }
.ri-m { font-size:11px; color:var(--g); }
.empty { display:none; border:3px dashed var(--k); margin:14px; padding:20px; text-align:center; font-size:13px; color:var(--g); }
.empty.on { display:block; }

/* ══ READER SCREEN ══ */
.prog {
  border-bottom: 3px solid var(--k);
  height: 24px;
  background: var(--w);
  position: relative;
  flex-shrink: 0;
}
.pf { height:100%; background:var(--k); width:0%; transition: width 0.15s; }
.pt {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:10px; font-weight:700;
  letter-spacing:.06em; color:var(--w); mix-blend-mode:difference;
  pointer-events:none;
}

.frow {
  display:flex; gap:6px; align-items:center;
  padding:6px 10px;
  border-bottom: 2px dashed var(--k);
  flex-shrink: 0;
}
.frow .btn { min-width:50px; min-height:36px; }
.flbl { font-family:var(--mono); font-size:10px; color:var(--g); margin-right:auto; letter-spacing:.07em; }

/*
  PAGE AREA — fills ALL remaining vertical space.
  NEVER scrolls. This is the hard boundary for text.
*/
#page-area {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  background: var(--w);
}

#bl {
  display: none;
  flex: 1;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--g);
  letter-spacing: .06em;
}
#bl.on { display: flex; }

/*
  #bt — rendered page of text.
  overflow: hidden — hard clip, NEVER scrolls.
  The pagination engine guarantees content never exceeds this height.
  padding must exactly match PAD_H / PAD_V constants in JS below.
*/
#bt {
  font-family: var(--body);
  font-size: 1.0rem;
  line-height: 1.85;
  /* IMPORTANT: these padding values are mirrored in JS as PAD_H / PAD_V */
  padding: 18px 22px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  display: none;
  background: var(--w);
  color: var(--k);
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.ch {
  display: block;
  font-family: var(--ui);
  font-size: 0.85em;
  font-weight: 700;
  text-align: center;
  letter-spacing: .16em;
  text-transform: uppercase;
  border-top: 2px solid var(--k);
  border-bottom: 2px solid var(--k);
  padding: 7px 0;
  margin: 14px 0 10px;
}

.nav {
  border-top: 3px solid var(--k);
  padding: 8px 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--w);
  flex-shrink: 0;
}
.nav .btn { min-width:86px; min-height:46px; font-size:12px; }
#pi { flex:1; text-align:center; font-family:var(--mono); font-size:11px; color:var(--g); letter-spacing:.06em; line-height:1.4; }

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--w); border-left:2px solid var(--k); }
::-webkit-scrollbar-thumb { background:var(--k); }
</style>
</head>
<body>

<div class="kindle-frame">

  <!-- ══ SEARCH SCREEN ══ -->
  <div id="ss">
    <div class="hero">
      <div class="hero-sub">Welcome to</div>
      <div class="hero-title">Readever</div>

      <div class="sbar">
        <div style="position:relative;flex:1;display:flex;">
          <input id="si" type="text" placeholder="what do you want to read?"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
          <div id="sug"></div>
        </div>
        <button class="sbar-btn" id="sb">→</button>
      </div>

      <div id="smsg"></div>
      <div class="ld" id="ld">
        <div style="display:flex;gap:5px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <span>Searching...</span>
      </div>
    </div>

    <div class="rarea" id="ra">
      <div class="rhdr" id="rh"></div>
      <div id="rl"></div>
      <div class="empty" id="em">[ No books found. Try another search. ]</div>
    </div>
  </div>

  <!-- ══ READER SCREEN ══ -->
  <div id="rs">
    <div class="tbar">
      <div class="tfill"></div>
      <button class="btn" id="back2" style="min-width:54px;font-size:11px;">← LIST</button>
    </div>

    <div class="prog">
      <div class="pf" id="pf"></div>
      <div class="pt" id="pp">0%</div>
    </div>

    <div class="frow">
      <span class="flbl">FONT SIZE</span>
      <button class="btn" id="fd">A−</button>
      <button class="btn" id="fu">A+</button>
    </div>

    <div id="page-area">
      <div id="bl" class="on">[ Loading... ]</div>
      <div id="bt"></div>
    </div>

    <div class="nav">
      <button class="btn" id="pv" disabled>◄ PREV</button>
      <span id="pi">— / —</span>
      <button class="btn" id="nx" disabled>NEXT ►</button>
    </div>
  </div>

</div>

<script>
'use strict';

const API = 'https://gutendex.com/books/';
const PRX = 'https://corsproxy.io/?';

// Mirror these exactly from CSS #bt padding:
const PAD_H = 22; // left + right each
const PAD_V = 18; // top + bottom each
const PARA_MB_EM = 0.7; // margin-bottom on each paragraph div

const $ = id => document.getElementById(id);
const ss=$('ss'), rs=$('rs'), si=$('si'), sug=$('sug'),
      smsg=$('smsg'), ld=$('ld'), rl=$('rl'), ra=$('ra'),
      rh=$('rh'), em=$('em'), bl=$('bl'),
      bt=$('bt'), pf=$('pf'), pp=$('pp'), pi=$('pi'),
      pv=$('pv'), nx=$('nx'), pageArea=$('page-area');

let debT = null;
let allParagraphs = [];
let pages = [];
let cur = 0;
let fs = 1.0;
let paginating = false;

// ═══════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════

si.addEventListener('input', () => {
  const q = si.value.trim();
  clearTimeout(debT);
  if (q.length < 2) { hideSug(); return; }
  debT = setTimeout(() => suggest(q), 360);
});
si.addEventListener('keydown', e => { if (e.key === 'Enter') { hideSug(); search(); } });
$('sb').addEventListener('click', () => { hideSug(); search(); });

async function suggest(q) {
  try {
    const d = await (await fetch(`${API}?search=${encodeURIComponent(q)}&page=1`)).json();
    const items = (d.results || []).slice(0, 6);
    if (!items.length) { hideSug(); return; }
    sug.innerHTML = '';
    items.forEach(b => {
      const el = document.createElement('div');
      el.className = 'si';
      const a = b.authors[0]?.name || '';
      el.innerHTML = `<span>${esc(b.title)}</span><span class="si-auth">${esc(a)}</span>`;
      el.onclick = () => { si.value = b.title; hideSug(); openBook(b); };
      sug.appendChild(el);
    });
    sug.classList.add('open');
  } catch(_) { hideSug(); }
}
function hideSug() { sug.classList.remove('open'); }

async function search() {
  const q = si.value.trim(); if (!q) return;
  rl.innerHTML = ''; em.classList.remove('on'); ra.classList.remove('on');
  ld.classList.add('on'); smsg.textContent = '';
  try {
    const d = await (await fetch(`${API}?search=${encodeURIComponent(q)}&page=1`)).json();
    const books = d.results || [];
    ld.classList.remove('on');
    ra.classList.add('on');
    if (!books.length) { em.classList.add('on'); return; }
    rh.textContent = `${books.length} result${books.length > 1 ? 's' : ''} found`;
    books.forEach(b => {
      const el = document.createElement('div');
      el.className = 'ri';
      const a = b.authors.map(x => x.name).join(', ') || 'Unknown';
      el.innerHTML = `<div class="ri-t">${esc(b.title)}</div>
                      <div class="ri-m">${esc(a)} · ${(b.download_count||0).toLocaleString()} reads</div>`;
      el.onclick = () => openBook(b);
      rl.appendChild(el);
    });
  } catch(_) {
    ld.classList.remove('on');
    smsg.textContent = 'Could not reach server.';
    ra.classList.add('on');
  }
}

// ═══════════════════════════════════════════════
// OPEN BOOK
// ═══════════════════════════════════════════════

async function openBook(b) {
  bt.innerHTML = '';
  bt.style.display = 'none';
  bl.classList.add('on');
  allParagraphs = []; pages = []; cur = 0;
  pv.disabled = true; nx.disabled = true;
  pi.textContent = '— / —';
  pf.style.width = '0%'; pp.textContent = '0%';

  ss.classList.add('off');
  rs.classList.add('on');

  const url = bestUrl(b.formats);
  if (!url) { showErr('No text version available.'); return; }

  try {
    let txt = null;
    try {
      const r = await fetch(url, { mode: 'cors' });
      if (r.ok) txt = await r.text();
    } catch(_) {}

    if (!txt) {
      const r = await fetch(PRX + encodeURIComponent(url));
      if (!r.ok) throw new Error('proxy failed');
      txt = await r.text();
    }

    processText(txt);
  } catch(_) {
    showErr('Could not load book. Check your connection.');
  }
}

function bestUrl(f) {
  for (const m of ['text/plain; charset=utf-8','text/plain; charset=us-ascii','text/plain'])
    if (f[m]) return f[m];
  const k = Object.keys(f).find(k => k.startsWith('text/plain'));
  return k ? f[k] : null;
}

// ═══════════════════════════════════════════════
// TEXT PROCESSING
// ═══════════════════════════════════════════════

function processText(raw) {
  let t = raw;

  const s = t.search(/\*{3}\s*START OF (THE|THIS) PROJECT GUTENBERG/i);
  if (s !== -1) t = t.slice(t.indexOf('\n', s) + 1);
  const en = t.search(/\*{3}\s*END OF (THE|THIS) PROJECT GUTENBERG/i);
  if (en !== -1) t = t.slice(0, en);
  t = t.trim();

  const rawParas = t.split(/\n{2,}/);

  allParagraphs = rawParas.map(p => {
    const trimmed = p.trim();
    if (!trimmed) return null;

    const isHeading =
      /^(chapter|part|book|section|prologue|epilogue|preface|appendix)\s+/i.test(trimmed) ||
      (trimmed.length < 70 && trimmed === trimmed.toUpperCase() && /[A-Z]{3}/.test(trimmed));

    if (isHeading) return `<span class="ch">${esc(trimmed)}</span>`;
    return esc(trimmed).replace(/\n/g, ' ');
  }).filter(Boolean);

  bl.classList.remove('on');
  bt.style.display = 'block';

  // Wait for layout to settle before paginating
  waitForLayout(() => paginate(() => render(0)));
}

function waitForLayout(cb) {
  let tries = 0;
  function check() {
    tries++;
    const h = pageArea.offsetHeight;
    const w = bt.offsetWidth || pageArea.offsetWidth;
    if (h > 80 && w > 80) {
      cb();
    } else if (tries < 60) {
      requestAnimationFrame(check);
    } else {
      cb(); // fallback
    }
  }
  requestAnimationFrame(check);
}

// ═══════════════════════════════════════════════
// PAGINATION ENGINE
// ═══════════════════════════════════════════════
/*
  How it works:
  ─────────────
  1.  Compute availH = pageArea.offsetHeight − (PAD_V * 2)
      This is the exact pixel budget for text content inside #bt.

  2.  Create a probe <div> that is:
        • appended as a SIBLING to #bt inside #page-area
          (so it inherits the exact same computed width as #bt)
        • position: absolute; top: -9999px → invisible, never affects layout
        • styled identically to #bt (font, size, line-height, width, padding:0)
          We strip padding because we measure content height only.

  3.  For each page, binary-search the max number of paragraphs
      whose rendered height ≤ availH.

  4.  Store {start, end} indices in pages[].

  The probe measures scrollHeight so even non-visible overflow is captured.
  This guarantees we never under-fill (wasted space) or over-fill (clipped text).
*/
function paginate(done) {
  if (paginating) return;
  paginating = true;
  pages = [];

  // ── Available content height ──
  const areaH  = pageArea.offsetHeight;
  const availH = areaH - (PAD_V * 2);

  // ── Text column width (content area only, no padding) ──
  // bt.clientWidth excludes padding. If not yet rendered, fall back.
  const colW = (bt.clientWidth > 0 ? bt.clientWidth : bt.offsetWidth - PAD_H * 2) || 714;

  // ── Font metrics from live bt element ──
  const cs        = getComputedStyle(bt);
  const fontFamily = cs.fontFamily;
  const lineHeight = cs.lineHeight; // already computed px value
  const fontSize   = `${fs}rem`;

  // ── Paragraph margin in px ──
  // PARA_MB_EM * fs rem converted to px
  const rootFontPx  = parseFloat(getComputedStyle(document.documentElement).fontSize) || 16;
  const paraMarginPx = PARA_MB_EM * fs * rootFontPx;

  if (availH <= 40 || !allParagraphs.length) {
    // Fallback: fixed chunk size
    const CHUNK = 6;
    for (let i = 0; i < allParagraphs.length; i += CHUNK)
      pages.push({ start: i, end: Math.min(i + CHUNK, allParagraphs.length) });
    paginating = false;
    done();
    return;
  }

  // ── Build probe ──
  // Absolute inside page-area → inherits correct width, invisible.
  const probe = document.createElement('div');
  probe.setAttribute('aria-hidden', 'true');
  probe.style.cssText = [
    'position:absolute',
    'top:-99999px',
    'left:0',
    'visibility:hidden',
    'pointer-events:none',
    `width:${colW}px`,
    `font-family:${fontFamily}`,
    `font-size:${fontSize}`,
    `line-height:${lineHeight}`,
    'padding:0',
    'margin:0',
    'box-sizing:border-box',
    'word-wrap:break-word',
    'overflow-wrap:break-word',
    'overflow:visible',
    'white-space:normal',
  ].join(';');
  pageArea.appendChild(probe);

  function paraHTML(idx) {
    return `<div style="margin-bottom:${paraMarginPx}px">${allParagraphs[idx]}</div>`;
  }

  function measureRange(startIdx, count) {
    let html = '';
    for (let i = startIdx; i < startIdx + count; i++) html += paraHTML(i);
    probe.innerHTML = html;
    return probe.scrollHeight;
  }

  const total = allParagraphs.length;
  let idx = 0;

  while (idx < total) {
    const remaining = total - idx;

    // Quick check: does everything remaining fit on one page?
    if (measureRange(idx, remaining) <= availH) {
      pages.push({ start: idx, end: total });
      break;
    }

    // Binary search: largest count where content height ≤ availH
    let lo = 1, hi = remaining, fit = 1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (measureRange(idx, mid) <= availH) {
        fit = mid;
        lo = mid + 1;
      } else {
        hi = mid - 1;
      }
    }

    // Safety: always advance at least 1 paragraph to avoid infinite loop
    if (fit < 1) fit = 1;
    pages.push({ start: idx, end: idx + fit });
    idx += fit;
  }

  pageArea.removeChild(probe);
  paginating = false;
  done();
}

// ═══════════════════════════════════════════════
// RENDER — paint exactly one page
// ═══════════════════════════════════════════════

function render(n) {
  if (!pages.length) return;
  n = Math.max(0, Math.min(n, pages.length - 1));
  cur = n;

  const { start, end } = pages[n];
  bt.style.fontSize = `${fs}rem`;

  const rootFontPx  = parseFloat(getComputedStyle(document.documentElement).fontSize) || 16;
  const paraMarginPx = PARA_MB_EM * fs * rootFontPx;

  bt.innerHTML = allParagraphs
    .slice(start, end)
    .map(p => `<div style="margin-bottom:${paraMarginPx}px">${p}</div>`)
    .join('');

  pv.disabled = (n === 0);
  nx.disabled = (n === pages.length - 1);
  pi.textContent = `Page ${n + 1} of ${pages.length}`;

  const pct = pages.length > 1 ? Math.round((n / (pages.length - 1)) * 100) : 100;
  pf.style.width = `${pct}%`;
  pp.textContent = `${pct}%`;
}

function showErr(m) {
  bl.classList.remove('on');
  bt.style.display = 'block';
  bt.innerHTML = `<div style="color:#555;font-family:var(--mono);font-size:0.85rem;padding:20px;">[ ${esc(m)} ]</div>`;
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════

pv.onclick = () => { if (cur > 0) render(cur - 1); };
nx.onclick = () => { if (cur < pages.length - 1) render(cur + 1); };

$('back2').onclick = () => {
  rs.classList.remove('on');
  ss.classList.remove('off');
};

// Touch swipe
let touchStartX = 0;
rs.addEventListener('touchstart', ev => {
  touchStartX = ev.changedTouches[0].clientX;
}, { passive: true });
rs.addEventListener('touchend', ev => {
  const dx = ev.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0 && cur < pages.length - 1) render(cur + 1);
    if (dx > 0 && cur > 0) render(cur - 1);
  }
}, { passive: true });

// Keyboard
document.addEventListener('keydown', e => {
  if (!rs.classList.contains('on')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (cur < pages.length - 1) render(cur + 1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { if (cur > 0) render(cur - 1); }
});

// ═══════════════════════════════════════════════
// FONT SIZE
// ═══════════════════════════════════════════════

$('fu').onclick = () => {
  if (fs < 1.8) { fs = +(fs + 0.1).toFixed(1); repaginate(); }
};
$('fd').onclick = () => {
  if (fs > 0.7) { fs = +(fs - 0.1).toFixed(1); repaginate(); }
};

function repaginate() {
  if (!allParagraphs.length) return;
  paginating = false;
  // Apply new font size to bt BEFORE measuring, so probe uses same lineHeight
  bt.style.fontSize = `${fs}rem`;
  const savedCur = cur;
  waitForLayout(() => paginate(() => render(Math.min(savedCur, pages.length - 1))));
}

// Re-paginate on resize (desktop)
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (allParagraphs.length && rs.classList.contains('on')) repaginate();
  }, 300);
});

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

document.addEventListener('click', ev => {
  if (!ev.target.closest('.sbar')) hideSug();
});
</script>
</body>
</html>
